// ── SYNTAX HIGHLIGHTING (minimal, CSS-based tokens) ──────────
function highlight(code) {
  const lines = code.split("\n");
  return lines.map((line, i) => {
    // tokenize very simply
    const parts = [];
    let rest = line;

    // comment line
    if (/^\s*(\/\/|\/\*|\*|#)/.test(rest)) {
      parts.push(<span key="c" style={{ color: "#8a9bb0" }}>{rest}</span>);
      return (
        <div key={i} style={{ display: "flex", minHeight: "1.5em" }}>
          <span style={{ color: "#7a1519", minWidth: 32, textAlign: "right", marginRight: 16, userSelect: "none", flexShrink: 0 }}>{i + 1}</span>
          <span>{parts}</span>
        </div>
      );
    }

    // Replace keywords, strings, JSX tags etc with colored spans
    const tokenized = tokenizeLine(rest);
    return (
      <div key={i} style={{ display: "flex", minHeight: "1.5em" }}>
        <span style={{ color: "#7a1519", minWidth: 32, textAlign: "right", marginRight: 16, userSelect: "none", flexShrink: 0 }}>{i + 1}</span>
        <span style={{ flex: 1 }}>{tokenized}</span>
      </div>
    );
  });
}

function tokenizeLine(line) {
  // Simple regex-based tokenizer
  const tokens = [];
  const regex = /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)|(\b(?:export|import|const|let|var|return|default|from|function|class|extends|new|if|else|for|of|in|null|true|false|undefined|async|await|=>)\b)|(\/\/.*$)|(\/\*[\s\S]*?\*\/)|(<\/?[A-Z][a-zA-Z]*|<\/?[a-z]+)|([A-Z][a-zA-Z]*(?=\s*[\(=]))|(\{|\}|\(|\)|\[|\]|;|,)/g;

  let lastIndex = 0;
  let m;
  while ((m = regex.exec(line)) !== null) {
    if (m.index > lastIndex) {
      tokens.push(<span key={lastIndex}>{line.slice(lastIndex, m.index)}</span>);
    }
    const [full, str, kw, inlineComment, blockComment, tag, component, punct] = m;
    if (str) tokens.push(<span key={m.index} style={{ color: "#7fa87f" }}>{full}</span>);
    else if (kw) tokens.push(<span key={m.index} style={{ color: "#c792ea" }}>{full}</span>);
    else if (inlineComment || blockComment) tokens.push(<span key={m.index} style={{ color: "#8a9bb0" }}>{full}</span>);
    else if (tag) tokens.push(<span key={m.index} style={{ color: "#89ddff" }}>{full}</span>);
    else if (component) tokens.push(<span key={m.index} style={{ color: "#ffcb6b" }}>{full}</span>);
    else if (punct) tokens.push(<span key={m.index} style={{ color: "#89ddff" }}>{full}</span>);
    else tokens.push(<span key={m.index}>{full}</span>);
    lastIndex = m.index + full.length;
  }
  if (lastIndex < line.length) tokens.push(<span key={lastIndex}>{line.slice(lastIndex)}</span>);
  return tokens;
}

// ── JSX VIEWER CONTENT ────────────────────────────────────────
function JsxViewerContent({ file }) {
  const code = JSX_CONTENT[file.name] || generateDefaultJsx(file);
  const [copied, setCopied] = useState(false);

  const handleCopy = () => {
    navigator.clipboard.writeText(code).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  };

  return (
    <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: "#0d1117", position: "relative" }}>
      {/* toolbar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 14px", background: "#161b22", borderBottom: "1px solid #21262d", flexShrink: 0 }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, letterSpacing: 1.5, color: "#6e7681", textTransform: "uppercase" }}>
          {file.ext === "JPG" || file.ext === "PNG" ? "JSX" : file.ext === "PDF" ? "JS" : file.ext === "DWG" ? "JS" : "JS"} · {file.name}
        </span>
        <button
          onClick={handleCopy}
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, letterSpacing: 1, color: copied ? "#3fb950" : "#6e7681", background: "none", border: "none", cursor: "pointer", padding: "2px 6px", transition: "color 0.2s" }}
        >
          {copied ? "COPIED" : "COPY"}
        </button>
      </div>
      {/* code */}
      <div style={{ flex: 1, overflowY: "auto", overflowX: "auto", padding: "16px 0", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, lineHeight: "1.6", color: "#e6edf3", background: "#0d1117" }}>
        <div style={{ minWidth: "max-content", paddingRight: 24 }}>
          {highlight(code)}
        </div>
      </div>
    </div>
  );
}

// ── DRAGGABLE WINDOW ─────────────────────────────────────────
function Window({ id, title, style, onClose, onExpand, breadcrumb, children, onMouseDownCapture, noPadding }) {
  const ref = useRef(null);
  const drag = useRef(null);
  const scrollRef = useRef(null);
  const trackRef = useRef(null);
  const [scrollRatio, setScrollRatio] = useState({ top:0, size:1 });
  const [pos, setPos] = useState({ left: style.left, top: style.top, width: style.width, height: style.height, expanded: false, prev: null });

  const handleScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    const ratio = el.scrollTop / (el.scrollHeight - el.clientHeight || 1);
    const size = el.clientHeight / el.scrollHeight;
    setScrollRatio({ top: ratio, size });
  };

  useEffect(() => { handleScroll(); }, [children]);

  const onThumbDown = e => {
    e.preventDefault();
    const el = scrollRef.current;
    const track = trackRef.current;
    if (!el || !track) return;
    const startY = e.clientY;
    const startScroll = el.scrollTop;
    const trackH = track.clientHeight;
    const scrollH = el.scrollHeight;
    const clientH = el.clientHeight;
    const thumbH = Math.max(20, (clientH / scrollH) * trackH);
    const availableTrack = trackH - thumbH;
    const onMove = ev => {
      const dy = ev.clientY - startY;
      el.scrollTop = startScroll + (dy / availableTrack) * (scrollH - clientH);
    };
    const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const MARGIN = 8;
  const trackH = trackRef.current ? trackRef.current.clientHeight - MARGIN * 2 : 200;
  const thumbH = 70;
  const availableTrack = trackH - thumbH;
  const thumbTop = MARGIN + scrollRatio.top * availableTrack;

  const onMouseDown = useCallback(e => {
    if (e.target.closest("[data-btn]")) return;
    e.preventDefault();
    const r = ref.current.getBoundingClientRect();
    drag.current = { ox: e.clientX - r.left, oy: e.clientY - r.top };
    document.body.style.userSelect = "none";
  }, []);

  useEffect(() => {
    const onMove = e => {
      if (!drag.current) return;
      setPos(p => ({ ...p, left: Math.max(0, e.clientX - drag.current.ox), top: Math.max(0, e.clientY - drag.current.oy) }));
    };
    const onUp = () => {
      drag.current = null;
      document.body.style.userSelect = "";
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const handleExpand = () => {
    if (pos.expanded) {
      setPos({ ...pos.prev, expanded: false, prev: null });
    } else {
      setPos({ left: 0, top: 38, width: "100%", height: "calc(100vh - 38px)", expanded: true, prev: pos });
    }
  };

  return (
    <div ref={ref} onMouseDownCapture={onMouseDownCapture} style={{ ...S.winWrap, left: pos.left, top: pos.top, width: pos.width, height: pos.height, zIndex: style.zIndex || 10 }}>
      <div style={S.winBar} onMouseDown={onMouseDown}>
        <BtnClose onClick={onClose} />
        {onExpand && <BtnExpand onClick={handleExpand} />}
        <span style={S.winBarTitle}>{title}</span>
      </div>
      <div ref={trackRef} style={{ ...S.winBody }}>
        {breadcrumb && <div style={S.breadcrumb}>{breadcrumb}</div>}
        <div style={{ flex:1, minHeight:0, display:"flex", flexDirection:"row", overflow:"hidden" }}>
          {noPadding ? (
            <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>{children}</div>
          ) : (
            <div className="win-scroll" style={{ ...S.scrollArea, flex:1, scrollbarWidth:"none", msOverflowStyle:"none" }} ref={scrollRef} onScroll={handleScroll}>{children}</div>
          )}
        </div>
        {!noPadding && scrollRatio.size < 1 && (
          <div
            style={{ position:"absolute", right:4, width:4, borderRadius:99, background:"#e8b4b4", cursor:"pointer", top: thumbTop + "px", height: thumbH + "px" }}
            onMouseDown={onThumbDown}
          />
        )}
      </div>
    </div>
  );
}

const DESCRIPTIONS = {
  ar00: "AR00 - Interior model\n\nThis series of photographs documents the interior of architectural models, capturing the subtle interplay between light, materiality and scale. Shot from within the models themselves, the images convey a sense of immersion and reveal carefully constructed atmospheres that go beyond the object itself.",
  ar02: "AR02 - The Real Book\n\nThe Real Book is an 828-page publication conceived by first-year architecture students at EPFL under the guidance of the ALICE laboratory (Atelier de la Conception de l'Espace), born out of the COVID-19 confinement of spring 2020. It documents the work that would have taken shape along the banks of the Rh\u00f4ne and Arve rivers in Geneva \u2014 a collective project reimagined through drawings, collages and digital representations \u2014 and was later selected as one of the most beautiful Swiss books by the Federal Office of Culture. I contributed to this collective endeavour as a first-year student.",
  ar09: "AR09 - UN GRAND ESPACE COMMUN\n\nAs part of this exercise, we focused on the theme of collective housing. Our work was anchored in a real-life case by examining a project studied by the small commune of Burtigny, Switzerland, for a collective housing initiative in the heart of the village.\n\nTo achieve this, we began with an initial study phase in which each group analyzed an activity such as cooking, washing, or working, and how these activities were expressed in collective housing projects across different eras and scales.\n\nIn the second phase, we worked closely with the village residents to imagine a project aligned with the community\u2019s expectations, working across various scales, from site analysis to 1:1 construction details. \n\nThe main idea of this project was to explore three degrees of privacy articulated within a housing building.",
  ar10: "AR10 - Stage Depeyre Morand Architectures\n\nA first six-month internship with the Parisian architectural firm Depeyre Morand Architectures proved to be an enriching immersion in the world of architecture. This multi-disciplinary experience was distinguished by the diversity of the assignments entrusted to us, enabling us to develop a wide range of skills, from graphic design to the processing of administrative documents.\n\nAmong the projects carried out during this period, illustrative posters were designed to present a garden project for a sheltered residence. These visuals were intended to showcase the efforts made to create a garden in the residents\u2019 own image, which they would be able to care for themselves.\n\nA series of summary models in plaster and brass was also produced. These models, precise and detailed, illustrated a succession of punctual interventions within the city of Paris. \n\nOne notable assignment was to draw up a preliminary design for an extension including six apartments for a sheltered residence. This work involved the preliminary stages of design, from site analysis to the formulation of architectural proposals, while integrating regulatory constraints and the needs of future occupants.",
  ar11: "AR11 - Le Meraviglie\n\nThe focus of this semester was to look at the Xyllela Fastidiosa epidemic, which for over ten years has been ravaging olive groves that are hundreds and sometimes thousands of years old, forming the landscape and guaranteeing the economic functioning of Puglia, in order to question the potential and place of architecture faced with such a catastrophe.\n\nThe entire studio began by immersing itself in the context through an exercise consisting in reproducing a work by the artist and architect Ugo La Pietra, whose practice is based inter alia on a critique of the relationship between man and the city, questioning the limits of domesticity and demonstrating a certain sensitivity to the Apulian territory, its culture, its materials and its know-how. For my part, I copied the \u2018Leaf Chair\u2019, a fragment of a collection of organically shaped steel outdoor furniture.\n\nBased on our research and reflections, we worked in pairs to come up with an architectural project. \u201dThe Meraviglie\u201d would be a park located to the west of the town of Ostuni, which is still relatively untouched by the epidemic. The park would include a pavilion and a series of built interventions, such as benches, kiosks, roads and paths, which would lead residents, farmers and visitors through forests, gardens, ruins and healthy, diseased or recently planted olive groves. It would offer a contemplative experience, an opportunity to raise awareness of the damage caused by the disease, as well as the alternatives envisaged to deal with it.",
  ar12: "AR12 - Constructing the view\n\nThis section explores a creative process in which architectural representation becomes a genuine narrative tool. Using digital techniques ranging from Photoshop collage to Cinema 4D rendering, each work was produced as part of Philipp Schaerer's 'Constructing the View' course at EPFL.\n\nThe collages and digital compositions combine to question and transcend conventional modes of representation, while the Cinema 4D renders emphasise attention to texture, light and spatial staging.\n\nTogether, these works highlight a commitment to exploring the possibilities offered by the image in the context of architecture.",
  ar13: "",
  ar14: "AR14 - Fondazione Berio\n\nThe Fondazione Berio is a theoretical project for a public building designed to archive sound documents for RAI (Radiotelevisione Italiana). It appears as a large treasure chest, a blind box where functional archive spaces, sound production and restoration areas, and listening and consultation spaces coexist.\n\nThe building follows a clear spatial organisation. The ground floor, framed by eight imposing concrete shafts, houses an open, multi-purpose space including a caf\u00e9, a terrace, a reception area and a cloakroom. On the first floor, the main space, a large atrium, is surrounded by a ring of individual listening spaces on which rest seven floors of archives and a level dedicated to the production and restoration of sound documents.\n\nThe emblematic feature of the building is a modular acoustic ceiling that hangs over the atrium. Able to be adjusted in height, it transforms the atrium into an auditorium, allowing sound content to be broadcast under controlled and varied acoustic conditions. The project pays particular attention to detail, with the edges of the archive compactors designed as acoustic panels, and the handrails in the archive spaces also serving as technical trellises for the sound and lighting equipment. Choices that reflect a desire for balance and dialogue between the different functions of the building, where each programme enriches the other. The Fondazione Berio thus stands for a harmonious cohabitation between storage and listening, designed to enhance the experience of sound archives within a coherent whole.",
  ar15: "AR15 Superstudio\n\nSuperstudio A was a research studio led by Pier Vittorio Aureli at EPFL, dedicated to the study of the villa as an architectural type from antiquity to the twentieth century. Rather than designing, students close-read a selected case study and produce an Analogous Map: an 80\u00d780cm line drawing that functions as a visual essay, situating a building within its historical, formal and ideological context.\n\nOur group worked on Le Corbusier's villas of the 1920s, exploring the dialectic between his theoretical models - the Maison Dom-Ino and the Maison Citrohan - and their material realisation in built works. Through the analysis of the Villa Stein-de Monzie and the Villa Baizeau, and through the lens of Le Corbusier's own Four Compositions diagram, the essay traces how abstract structural principles found spatial and sensory form. The accompanying text of 1,500 words develops this argument in parallel.",
};

// ── DUMP WINDOW ───────────────────────────────────────────────
function DumpWindow({ win, closeWindow, bringToFront, openViewer }) {
  const W = Math.round(window.innerWidth * 0.8);
  const H = Math.round(window.innerHeight * 0.8);
  const left = Math.round((window.innerWidth - W) / 2);
  const top  = Math.round((window.innerHeight - H) / 2 - 30);

  const files = (FOLDERS.dump.files || []);

  // Positions initiales aléatoires — calculées une seule fois à l'ouverture
  const initPositions = useRef(null);
  if (!initPositions.current) {
    initPositions.current = files.map((f, i) => {
      const seed = f.name.split("").reduce((a,c) => a + c.charCodeAt(0), i * 37);
      return {
        x: 60 + (seed * 137) % (W - 200),
        y: 60 + (seed * 97)  % (H - 220),
        rot: ((seed % 21) - 10),
      };
    });
  }

  const [positions, setPositions] = useState(initPositions.current);
  const [scale, setScale] = useState(1);
  const [pan, setPan] = useState({ x:0, y:0 });
  const panRef = useRef(null);
  const canvasRef = useRef(null);

  // Zoom trackpad
  const onWheel = (e) => {
    e.preventDefault();
    if (e.ctrlKey) {
      setScale(s => Math.min(3, Math.max(0.3, s * (1 - e.deltaY * 0.01))));
    } else {
      setPan(p => ({ x: p.x - e.deltaX, y: p.y - e.deltaY }));
    }
  };

  // Drag d'un fichier individuel
  const onFileMouseDown = (e, idx, fname) => {
    e.stopPropagation();
    e.preventDefault();
    const startX = e.clientX;
    const startY = e.clientY;
    const origX = positions[idx].x;
    const origY = positions[idx].y;
    let moved = false;
    const onMove = (ev) => {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      if (!moved && Math.sqrt(dx*dx + dy*dy) > 4) moved = true;
      if (moved) {
        setPositions(ps => ps.map((p, i) => i === idx ? { ...p, x: origX + dx/scale, y: origY + dy/scale } : p));
      }
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      if (!moved) openViewer("dump", "dump", "DUMP", idx);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  return (
    <div onMouseDown={() => bringToFront(win.id)} style={{ position:"absolute", left, top, width:W, height:H, display:"flex", flexDirection:"column", zIndex:win.zIndex, overflow:"hidden", pointerEvents:"auto", border:"1.25px solid #a21c26", borderRadius:4, background:"#fff" }}>
      {/* Barre */}
      <div style={{ height:38, flexShrink:0, background:"#fff", borderBottom:"1.25px solid #a21c26", display:"flex", alignItems:"center", padding:"0 8px", gap:7, position:"relative" }}>
        <BtnClose onClick={() => closeWindow(win.id)} />
        <span style={{ position:"absolute", right:12, fontFamily:"'IBM Plex Mono',monospace", fontSize:13, fontWeight:700, letterSpacing:1.5, color:"#a21c26" }}>DUMP</span>
      </div>
      {/* Canvas zoomable */}
      <div
        ref={canvasRef}
        onWheel={onWheel}
        style={{ flex:1, overflow:"hidden", position:"relative", cursor:"default" }}
      >
        <div style={{ position:"absolute", inset:0, transform:`translate(${pan.x}px,${pan.y}px) scale(${scale})`, transformOrigin:"0 0" }}>
          {files.map((f, i) => {
            const pos = positions[i] || { x:60+i*30, y:60+i*20, rot:0 };
            const isImg = ["JPG","PNG","JPEG"].includes(f.ext.toUpperCase());
            const thumbSrc = isImg ? getImageSrc(f.name) : null;
            return (
              <div
                key={i}
                onMouseDown={(e) => onFileMouseDown(e, i, f.name)}
                style={{ position:"absolute", left:pos.x, top:pos.y, transform:`rotate(${pos.rot}deg)`, cursor:"grab", userSelect:"none", display:"flex", flexDirection:"column", alignItems:"center", width:120 }}
              >
                {thumbSrc
                  ? <img src={thumbSrc} draggable="false" style={{ width:108, height:130, objectFit:"cover", display:"block", filter:"drop-shadow(0px 4px 12px rgba(0,0,0,0.18))" }}/>
                  : <FileIcon ext={f.ext} w={108} h={130}/>
                }
                <div style={{ fontSize:9, fontWeight:500, color:"#a21c26", marginTop:6, fontFamily:"'IBM Plex Mono',monospace", letterSpacing:1, maxWidth:108, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", textAlign:"center" }}>{f.name}</div>
              </div>
            );
          })}
          {files.length === 0 && (
            <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", color:"#e8b4b4", fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:2 }}>EMPTY</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── TEXT WINDOW ───────────────────────────────────────────────
function TextWindow({ win, folder, closeWindow, bringToFront, openDossier, openProjet, setWindows }) {
  const text = DESCRIPTIONS[win.projId] || "";

  const top  = PROJ_TOP + PROJ_H + 8;

  return (
    <Window
      title={`${win.projId.toUpperCase()}.description.txt`}
      style={{ left: left + "px", top: top + "px", width: W + "px", height: H + "px", zIndex: win.zIndex }}

        }

}

// ── ADAPTIVE VIEWER WINDOW ────────────────────────────────────
function AdaptiveViewerWindow({ win, currentFile, proj, folder, closeWindow, bringToFront, openDossier, openProjet, setFs, navigate, setWindows }) {
  const BAR_H = 38;
  const CRUMB_H = 28;
  const HEADER_H = 61;
  const MARGIN = 16;
  const H = Math.round(window.innerHeight * 0.45);
  const W = Math.round(H * 1.2);
  const TOP_OFFSET = 0;

  const imgSrc = getImageSrc(currentFile?.name);

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const PROJ_RIGHT = 52 + 640 + 16;
  const canFitRight = PROJ_RIGHT + W + 8 <= vw;
  const baseLeft = canFitRight
    ? PROJ_RIGHT + (win.offsetX || 0)
    : 260 + (win.offsetX || 0);
  const rawLeft = baseLeft;
  const rawTop = 8 + (win.offsetY || 0);
  const left = Math.max(4, Math.min(rawLeft, vw - W - 8));
  const top = Math.max(0, Math.min(rawTop, vh - HEADER_H - H - 16));

  const [pos, setPos] = useState({ left, top });
  const [size, setSize] = useState({ w: W, h: H });
  const dragRef = useRef(null);
  const resizeRef = useRef(null);

  const onBarMouseDown = e => {
    if (e.target.closest("[data-btn]")) return;
    e.preventDefault();
    bringToFront(win.id);
    document.body.style.userSelect = "none";
    dragRef.current = { ox: e.clientX - pos.left, oy: e.clientY - pos.top };
    const onMove = ev => {
      if (!dragRef.current) return;
      setPos({ left: Math.max(0, ev.clientX - dragRef.current.ox), top: Math.max(0, ev.clientY - dragRef.current.oy - HEADER_H) });
    };
    const onUp = () => {
      dragRef.current = null;
      document.body.style.userSelect = "";
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const onResizeMouseDown = (e, dir) => {
    e.preventDefault();
    e.stopPropagation();
    bringToFront(win.id);
    document.body.style.userSelect = "none";
    resizeRef.current = { sx: e.clientX, sy: e.clientY, sw: size.w, sh: size.h, dir };
    const onMove = ev => {
      if (!resizeRef.current) return;
      const { sx, sy, sw, sh, dir } = resizeRef.current;
      const dx = ev.clientX - sx;
      const dy = ev.clientY - sy;
      setSize({
        w: dir !== "s" ? Math.max(260, sw + dx) : sw,
        h: dir !== "e" ? Math.max(180, sh + dy) : sh,
      });
    };
    const onUp = () => {
      resizeRef.current = null;
      document.body.style.userSelect = "";
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  return (
    <div onMouseDown={() => bringToFront(win.id)} style={{ position:"absolute", left: pos.left + "px", top: pos.top + "px", width: size.w + "px", height: size.h + "px", zIndex: win.zIndex, pointerEvents:"auto", display:"flex", flexDirection:"column" }}>
      {/* Bar */}
      <div onMouseDown={onBarMouseDown} style={{ height:BAR_H, flexShrink:0, background:"#fff", border:"1.25px solid #a21c26", borderBottom:"1.25px solid #a21c26", borderRadius:"4px 4px 0 0", display:"flex", alignItems:"center", padding:"0 8px", gap:7, cursor:"grab", position:"relative", userSelect:"none" }}>
        <BtnClose onClick={() => closeWindow(win.id)} />
        <BtnExpand onClick={() => setFs({ projId: win.projId, projName: win.projName, fileIdx: win.fileIdx, folderId: win.folderId })} />
        <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:13, fontWeight:700, letterSpacing:1.5, color:"#a21c26", pointerEvents:"none", whiteSpace:"nowrap", overflow:"hidden", maxWidth:"55%", fontFamily:"inherit" }}>{currentFile.name}</span>
      </div>
      {/* Body */}
      <div style={{ flex:1, minHeight:0, background:"#fff", border:"1.25px solid #a21c26", borderTop:"none", borderRadius:"0 0 4px 4px", display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
        {/* Breadcrumb */}
        <div style={{ height:CRUMB_H, flexShrink:0, display:"flex", alignItems:"center", padding:"0 12px", fontSize:9, fontWeight:700, letterSpacing:1, color:"#c97a7a", overflow:"hidden", flexWrap:"nowrap" }}>
          {[
            { label:"Bureau", onClick:() => {} },
            { label: folder.label, onClick:() => openDossier(win.folderId) },
            { label: win.projName, onClick:() => openProjet(win.folderId, win.projId, win.projName) },
            { label: currentFile.name },
          ].map((p, i, arr) => {
            const isMiddle = i > 0 && i < arr.length - 1;
            return (
              <span key={i} style={{ display:"flex", alignItems:"center", flexShrink: isMiddle ? 1 : 0, minWidth:0, overflow:"hidden" }}>
                {i > 0 && <span style={{ color:"#f0d0d0", margin:"0 4px", flexShrink:0 }}>{"›"}</span>}
                <span onClick={p.onClick} title={p.label} style={{ cursor: p.onClick ? "pointer" : "default", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth: isMiddle ? "100px" : "none" }}>{p.label}</span>
              </span>
            );
          })}
        </div>
        {/* Image */}
        <div style={{ flex:1, minHeight:0, display:"flex", alignItems:"center", justifyContent:"center", padding: MARGIN + "px", boxSizing:"border-box", overflow:"hidden", position:"relative" }}>
          {imgSrc ? (
            <img src={imgSrc} alt={currentFile.name} draggable="false" style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block" }}/>
          ) : (
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", width:"100%", height:"100%", background:"repeating-linear-gradient(45deg,#e8e8e3,#e8e8e3 8px,#ddd 8px,#ddd 16px)", border:"1px solid #ccc" }}>
              <FileIcon ext={currentFile.ext} w={120} h={144}/>
            </div>
          )}
          <div onClick={() => navigate(-1)} style={{ position:"absolute", left:6, top:"50%", transform:"translateY(-50%)", width:22, height:44, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", userSelect:"none" }}>
            <svg width="12" height="24" viewBox="0 0 12 24"><polyline points="10,2 2,12 10,22" fill="none" stroke="#e8b4b4" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div onClick={() => navigate(1)} style={{ position:"absolute", right:6, top:"50%", transform:"translateY(-50%)", width:22, height:44, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", userSelect:"none" }}>
            <svg width="12" height="24" viewBox="0 0 12 24"><polyline points="2,2 10,12 2,22" fill="none" stroke="#e8b4b4" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        </div>
      </div>
    </div>
  );
}

let nextId = 1;
let nextZ = 10;

function App() {
  const [windows, setWindows] = useState([]);
  const [fs, setFs] = useState(null);

  const bringToFront = id => {
    nextZ++;
    const z = nextZ;
    setWindows(ws => ws.map(w => w.id === id ? { ...w, zIndex: z } : w));
  };

  const closeWindow = id => setWindows(ws => {
    const closing = ws.find(w => w.id === id);
    return ws.filter(w => {
      if (w.id === id) return false;
      // Si on ferme un projet, fermer aussi sa texte window
      if (closing?.type === "projet" && w.type === "texte" && w.projId === closing.projId) return false;
      return true;
    });
  });

  const openDossier = folderId => {
    const existing = windows.find(w => w.type === "dossier" && w.folderId === folderId);
    if (existing) { bringToFront(existing.id); return; }
    nextZ++; nextId++;
    setWindows(ws => [...ws, { id: nextId, type:"dossier", folderId, zIndex: nextZ }]);
  };

  const openProjet = (folderId, projId, projName) => {
    const existing = windows.find(w => w.type === "projet" && w.projId === projId);
    if (existing) { bringToFront(existing.id); return; }
    nextZ++; nextId++;
    const projWinId = nextId;
    nextZ++; nextId++;
    const txtWinId = nextId;
    setWindows(ws => [...ws,
      { id: projWinId, type:"projet", folderId, projId, projName, zIndex: nextZ - 1 },
      { id: txtWinId,  type:"texte",  folderId, projId, projName, zIndex: nextZ },
    ]);
  };

  const openViewer = (folderId, projId, projName, fileIdx) => {
    const id = ++nextId;
    const z = ++nextZ;
    const count = windows.filter(w => w.type === "viewer").length;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const H = Math.round(vh * 0.45);
    const W = Math.round(H * 1.2);
    const cols = 2;
    const col = count % cols;
    const row = Math.floor(count / cols);
    const jitterX = Math.round((Math.random() - 0.5) * 80);
    const jitterY = Math.round((Math.random() - 0.5) * 60);
    const offsetX = col * Math.round(W * 0.85) + jitterX;
    const offsetY = row * Math.round(H * 0.85) + jitterY;
    setWindows(ws => {
      const minViewerZ = Math.min(...ws.filter(w => w.type === "viewer").map(w => w.zIndex), z);
      return [
        ...ws.map(w =>
          (w.type === "dossier" && w.folderId === folderId) || (w.type === "projet" && w.projId === projId)
            ? { ...w, zIndex: Math.min(w.zIndex, minViewerZ - 1) }
            : w
        ),
        { id, type:"viewer", folderId, projId, projName, fileIdx, zIndex: z, offsetX, offsetY }
      ];
    });
  };

  useEffect(() => {
    if (!fs) return;
    const proj = getProj(fs.projId);
    const h = e => {
      if (e.key === "ArrowRight") setFs(s => ({ ...s, fileIdx: (s.fileIdx + 1) % proj.files.length }));
      if (e.key === "ArrowLeft")  setFs(s => ({ ...s, fileIdx: (s.fileIdx - 1 + proj.files.length) % proj.files.length }));
      if (e.key === "Escape") setFs(null);
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [fs]);

  return (
    <div style={S.root} onDragStart={e => e.preventDefault()}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet"/>
      <style>{`.win-scroll::-webkit-scrollbar { display: none; } *, *:focus, *:active { outline: none !important; -webkit-tap-highlight-color: transparent; } html, body, #root { height: 100%; margin: 0; padding: 0; } img, svg { -webkit-user-drag: none; user-select: none; } `}</style>

      <div style={{ display:"flex", flexDirection:"column", position:"absolute", inset:0 }}>
        <header style={S.header}>
          <div style={{ ...S.logo }} onClick={() => setWindows([])}>La Slack</div>
        </header>
        <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
          <DotBg/>

          {["architecture","objects","graphicdesign"].map((fid, i) => {
            const positions = [
              { left:"8%", top:"6%" },
              { right:"12%", top:"15%" },
              { left:"22%", bottom:"8%" },
            ];
            const labels = ["ARCHITECTURE","OBJECTS","GRAPHIC DESIGN"];
            const zIndexes = [3, 2, 1];
            const dimmed = windows.length > 0;
            return (
              <div key={fid}
                onClick={dimmed ? undefined : () => openDossier(fid)}
                style={{ ...S.deskIcon, ...positions[i], opacity: dimmed ? 0.18 : 1, pointerEvents: dimmed ? "none" : "auto", zIndex: zIndexes[i] }}
                onMouseEnter={e => { if (!dimmed) e.currentTarget.querySelector("svg").style.transform = "translateY(-6px)"; }}
                onMouseLeave={e => { if (!dimmed) e.currentTarget.querySelector("svg").style.transform = "none"; }}
              >
                <FolderSVG w={350} h={269} sw={1.25}/>
                <div style={S.deskLabel}>{labels[i]}</div>
              </div>
            );
          })}
          <div
            onClick={windows.length > 0 ? undefined : () => openDossier("dump")}
            style={{ ...S.deskIcon, right:"1%", bottom:"2%", opacity: windows.length > 0 ? 0.18 : 1, pointerEvents: windows.length > 0 ? "none" : "auto", zIndex: 0 }}
            onMouseEnter={e => { if (!windows.length) e.currentTarget.querySelector("svg").style.transform = "translateY(-6px)"; }}
            onMouseLeave={e => { if (!windows.length) e.currentTarget.querySelector("svg").style.transform = "none"; }}
          >
            <DumpSVG w={175} h={230} sw={1.25}/><div style={S.deskLabel}>DUMP</div>
          </div>

          {windows.length > 0 && !fs && (
            <div
              onClick={() => setWindows([])}
              style={{ position:"fixed", bottom:18, left:20, display:"flex", alignItems:"center", gap:10, cursor:"pointer", zIndex:99999, pointerEvents:"auto", userSelect:"none", background:"#fff", padding:"6px 12px 6px 8px" }}
              onMouseEnter={e => e.currentTarget.style.opacity = 0.7}
              onMouseLeave={e => e.currentTarget.style.opacity = 1}
            >
              <svg viewBox="0 0 18 18" width="18" height="18"><line x1="2" y1="16" x2="16" y2="2" stroke="#a21c26" strokeWidth="1.5"/><line x1="2" y1="2" x2="16" y2="16" stroke="#a21c26" strokeWidth="1.5"/></svg>
              <span style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:13, fontWeight:400, letterSpacing:1.5, color:"#a21c26" }}>Clear all</span>
            </div>
          )}

          {windows.map(win => {
            const folder = FOLDERS[win.folderId] || {};
            const proj = win.projId ? getProj(win.projId) : null;

            if (win.type === "dossier") {
              if (win.folderId === "dump") {
                return (
                  <div key={win.id} style={{ position:"absolute", inset:0, pointerEvents:"none", zIndex: win.zIndex }}>
                    <DumpWindow
                      win={win}
                      closeWindow={closeWindow}
                      bringToFront={bringToFront}
                      openViewer={openViewer}
                    />
                  </div>
                );
              }
              return (
                <div key={win.id} style={{ position:"absolute", inset:0, pointerEvents:"none", zIndex: win.zIndex }}>
                  <Window
                    title={folder.label}
                    style={{ left:"20px", top:"16px", width:"640px", height:"391px", zIndex: win.zIndex }}
                    onClose={() => closeWindow(win.id)}
                    onMouseDownCapture={() => bringToFront(win.id)}
                    breadcrumb={
                      <Breadcrumb parts={[
                        { label:"Bureau", onClick:() => setWindows([]) },
                        { label: folder.label },
                      ]}/>
                    }
                  >
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 160px)", columnGap:36, rowGap:8, padding:"0px 0", padding:"0px 0", marginTop:-11, justifyContent:"center", paddingBottom:10 }}>
                      {(folder.sub || []).map(sub => (
                        <div key={sub.id}
                          onClick={() => openProjet(win.folderId, sub.id, sub.name)}
                          style={{ display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", padding:8 }}
                          onMouseEnter={e => e.currentTarget.querySelector("svg").style.transform="translateY(-3px)"}
                          onMouseLeave={e => e.currentTarget.querySelector("svg").style.transform="none"}
                        >
                          <FolderSVG w={160} h={123} sw={2.4}/>
                          <div style={{ ...S.deskLabel, fontSize:9, marginTop:10, fontWeight:500 }}>{sub.name}</div>
                        </div>
                      ))}
                    </div>
                  </Window>
                </div>
              );
            }

            if (win.type === "projet") {
              return (
                <div key={win.id} style={{ position:"absolute", inset:0, pointerEvents:"none", zIndex: win.zIndex }}>
                  <Window
                    title={win.projName}
                    style={{ left:"52px", top:"42px", width:"640px", height:"410px", zIndex: win.zIndex }}
                    onClose={() => closeWindow(win.id)}
                    onMouseDownCapture={() => bringToFront(win.id)}
                    breadcrumb={
                      <Breadcrumb parts={[
                        { label:"Bureau", onClick:() => setWindows([]) },
                        { label: folder.label, onClick:() => openDossier(win.folderId) },
                        { label: win.projName },
                      ]}/>
                    }
                  >
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 100px)", columnGap:42, rowGap:16, marginLeft:-50, marginRight:-50, marginTop:-3, justifyContent:"center" }}>
                      {proj.files.map((f, i) => ({ f, i })).filter(({ f }) => f.ext.toUpperCase() !== "TXT").map(({ f, i }) => {
                        const isImg = ["JPG","PNG","JPEG"].includes(f.ext.toUpperCase());
                        const isPdf = f.ext.toUpperCase() === "PDF";
                        const isTxt = f.ext.toUpperCase() === "TXT";
                        const thumbSrc = isImg ? getImageSrc(f.name) + "?w=80" : null;
                        const isDump = win.folderId === "dump";
                        const seed = f.name.split("").reduce((a,c) => a + c.charCodeAt(0), 0);
                        const rot = isDump ? ((seed % 21) - 10) : 0;
                        const tx = isDump ? ((seed * 7) % 30) - 15 : 0;
                        const ty = isDump ? ((seed * 13) % 20) - 10 : 0;
                        return (
                          <div key={i}
                            onClick={() => {
                              if (isPdf) { window.open(getImageSrc(f.name) || `https://raw.githubusercontent.com/kselaven-del/portfolio-architecture/main/${encodeURIComponent(f.name)}`, "_blank"); }
                              else if (isTxt) {
                                const existing = windows.find(w => w.type === "texte" && w.projId === win.projId);
                                if (existing) { bringToFront(existing.id); }
                                else { nextZ++; nextId++; setWindows(ws => [...ws, { id: nextId, type:"texte", folderId: win.folderId, projId: win.projId, projName: win.projName, zIndex: nextZ }]); }
                              }
                              else { openViewer(win.folderId, win.projId, win.projName, i); }
                            }}
                            style={{ display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", padding:4, transform: `rotate(${rot}deg) translate(${tx}px,${ty}px)`, transition:"transform 0.15s", zIndex: isDump ? seed % 5 : "auto", position: isDump ? "relative" : "static" }}
                            onMouseEnter={e => { e.currentTarget.style.transform = isDump ? `rotate(${rot}deg) translate(${tx}px,${ty}px) scale(1.08)` : "translateY(-2px)"; e.currentTarget.style.zIndex = 99; }}
                            onMouseLeave={e => { e.currentTarget.style.transform = isDump ? `rotate(${rot}deg) translate(${tx}px,${ty}px)` : "none"; e.currentTarget.style.zIndex = isDump ? seed % 5 : "auto"; }}
                          >
                            {thumbSrc ? (
                              <img
                                src={thumbSrc}
                                alt={f.name}
                                style={{ width:108, height:130, objectFit:"contain", display:"block", imageRendering:"pixelated", transition:"transform 0.15s" }}
                                onError={e => { e.target.style.display="none"; e.target.nextSibling.style.display="block"; }}
                              />
                            ) : null}
                            <div style={{ display: thumbSrc ? "none" : "block" }}>
                              <FileIcon ext={f.ext} w={108} h={130}/>
                            </div>
                            <div style={{ ...S.deskLabel, fontSize:9, marginTop:10, fontWeight:500, maxWidth:"108px" }}>{f.name}</div>
                          </div>
                        );
                      })}
                    </div>
                  </Window>
                </div>
              );
            }

            if (win.type === "texte") {
              return (
                <div key={win.id} style={{ position:"absolute", inset:0, pointerEvents:"none", zIndex: win.zIndex }}>
                  <TextWindow
                    win={win}
                    folder={folder}
                    closeWindow={closeWindow}
                    bringToFront={bringToFront}
                    openDossier={openDossier}
                    openProjet={openProjet}
                    setWindows={setWindows}
                  />
                </div>
              );
            }

            if (win.type === "viewer") {
              const currentFile = proj.files[win.fileIdx];
              const navigate = (dir) => {
                const newIdx = (win.fileIdx + dir + proj.files.length) % proj.files.length;
                setWindows(ws => ws.map(w => w.id === win.id ? { ...w, fileIdx: newIdx } : w));
              };
              return (
                <AdaptiveViewerWindow
                  key={win.id}
                  win={win}
                  currentFile={currentFile}
                  proj={proj}
                  folder={folder}
                  closeWindow={closeWindow}
                  bringToFront={bringToFront}
                  openDossier={openDossier}
                  openProjet={openProjet}
                  setFs={setFs}
                  navigate={navigate}
                  setWindows={setWindows}
                />
              );
            }

            return null;
          })}
        </div>
      </div>

      {/* FULLSCREEN */}
      {fs && (() => {
        const proj = getProj(fs.projId);
        const currentFile = proj.files[fs.fileIdx];
        const imgSrc = getImageSrc(currentFile?.name);
        return (
          <div style={{ position:"fixed", top:61, left:0, right:0, bottom:0, background:"#fff", zIndex:9999, display:"flex", flexDirection:"column", overflow:"hidden", borderTop:"1.25px solid #a21c26" }}>
            {/* Barre top avec ligne rouge */}
            <div style={{ height:38, background:"#fff", borderBottom:"1.25px solid #a21c26", display:"flex", alignItems:"center", padding:"0 8px", gap:7, flexShrink:0, position:"relative" }}>
              <BtnClose onClick={() => setFs(null)} />
              <div style={{ position:"absolute", left:80, right:12, top:"50%", transform:"translateY(-50%)", display:"flex", alignItems:"center", justifyContent:"flex-end", fontSize:9, fontWeight:700, letterSpacing:1, color:"#c97a7a", overflow:"hidden", whiteSpace:"nowrap" }}>
                {[
                  { label:"Bureau" },
                  { label: fs.folderId ? FOLDERS[fs.folderId]?.label : "" },
                  { label: fs.projName },
                  { label: currentFile.name },
                ].filter(p => p.label).map((p, i, arr) => {
                  const isLast = i === arr.length - 1;
                  return (
                    <span key={i} style={{ display:"flex", alignItems:"center", flexShrink: isLast ? 0 : 1, minWidth:0, overflow:"hidden" }}>
                      {i > 0 && <span style={{ color:"#f0d0d0", margin:"0 4px", flexShrink:0 }}>{"›"}</span>}
                      <span title={p.label} style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth: isLast ? "none" : "120px", color: isLast ? "#a21c26" : "#c97a7a" }}>{p.label}</span>
                    </span>
                  );
                })}
              </div>
            </div>
            {/* Image + flèches collées à l'image */}
            <div style={{ flex:1, minHeight:0, overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center", background:"#fff", position:"relative" }}>
              <div style={{ position:"relative", display:"flex", alignItems:"center", justifyContent:"center", width:"100%", height:"100%", padding:"16px 48px", boxSizing:"border-box" }}>
                {imgSrc ? (
                  <img src={imgSrc} alt={currentFile.name} draggable="false" style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block" }}/>
                ) : (
                  <div style={{ width:300, height:300, display:"flex", alignItems:"center", justifyContent:"center", background:"repeating-linear-gradient(45deg,#e8e8e3,#e8e8e3 8px,#ddd 8px,#ddd 16px)" }}>
                    <FileIcon ext={currentFile.ext} w={120} h={144}/>
                  </div>
                )}

              </div>
            </div>
            {/* Thumbnails sans bordure */}
            <div style={{ height:76, background:"#fff", borderTop:"1.25px solid #a21c26", display:"flex", gap:8, padding:"8px 14px", overflowX:"auto", flexShrink:0, alignItems:"center" }}>
              {proj.files.map((f,i) => {
                const tSrc = getImageSrc(f.name);
                return (
                  <div key={i} onClick={() => setFs(s => ({ ...s, fileIdx:i }))}
                    style={{ width:58, height:58, flexShrink:0, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", background:"#fff", overflow:"hidden", opacity: i===fs.fileIdx ? 1 : 0.45, transition:"opacity 0.15s" }}>
                    {tSrc ? (
                      <img src={tSrc + "?w=80"} alt={f.name} style={{ width:"100%", height:"100%", objectFit:"cover", imageRendering:"pixelated" }}/>
                    ) : (
                      <FileIcon ext={f.ext} w={36} h={43}/>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
      {/* Poignées resize */}
      <div onMouseDown={e => onResizeMouseDown(e, "s")}  style={{ position:"absolute", bottom:-5, left:0, right:0, height:10, cursor:"s-resize", zIndex:1000, background:"rgba(255,0,0,0.4)" }}/>
      <div onMouseDown={e => onResizeMouseDown(e, "e")}  style={{ position:"absolute", right:-5, top:0, bottom:0, width:10, cursor:"e-resize", zIndex:1000, background:"rgba(0,200,0,0.4)" }}/>
      <div onMouseDown={e => onResizeMouseDown(e, "se")} style={{ position:"absolute", bottom:-5, right:-5, width:18, height:18, cursor:"se-resize", zIndex:1001, background:"rgba(0,0,255,0.4)" }}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
