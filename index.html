// ── SYNTAX HIGHLIGHTING (minimal, CSS-based tokens) ──────────
function highlight(code) {
  const lines = code.split("\n");
  return lines.map((line, i) => {
    // tokenize very simply
    const parts = [];
    let rest = line;

    // comment line
    if (/^\s*(\/\/|\/\*|\*|#)/.test(rest)) {
      parts.push(<span key="c" style={{ color: "#8a9bb0" }}>{rest}</span>);
      return (
        <div key={i} style={{ display: "flex", minHeight: "1.5em" }}>
          <span style={{ color: "#7a1519", minWidth: 32, textAlign: "right", marginRight: 16, userSelect: "none", flexShrink: 0 }}>{i + 1}</span>
          <span>{parts}</span>
        </div>
      );
    }

    // Replace keywords, strings, JSX tags etc with colored spans
    const tokenized = tokenizeLine(rest);
    return (
      <div key={i} style={{ display: "flex", minHeight: "1.5em" }}>
        <span style={{ color: "#7a1519", minWidth: 32, textAlign: "right", marginRight: 16, userSelect: "none", flexShrink: 0 }}>{i + 1}</span>
        <span style={{ flex: 1 }}>{tokenized}</span>
      </div>
    );
  });
}

function tokenizeLine(line) {
  // Simple regex-based tokenizer
  const tokens = [];
  const regex = /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)|(\b(?:export|import|const|let|var|return|default|from|function|class|extends|new|if|else|for|of|in|null|true|false|undefined|async|await|=>)\b)|(\/\/.*$)|(\/\*[\s\S]*?\*\/)|(<\/?[A-Z][a-zA-Z]*|<\/?[a-z]+)|([A-Z][a-zA-Z]*(?=\s*[\(=]))|(\{|\}|\(|\)|\[|\]|;|,)/g;

  let lastIndex = 0;
  let m;
  while ((m = regex.exec(line)) !== null) {
    if (m.index > lastIndex) {
      tokens.push(<span key={lastIndex}>{line.slice(lastIndex, m.index)}</span>);
    }
    const [full, str, kw, inlineComment, blockComment, tag, component, punct] = m;
    if (str) tokens.push(<span key={m.index} style={{ color: "#7fa87f" }}>{full}</span>);
    else if (kw) tokens.push(<span key={m.index} style={{ color: "#c792ea" }}>{full}</span>);
    else if (inlineComment || blockComment) tokens.push(<span key={m.index} style={{ color: "#8a9bb0" }}>{full}</span>);
    else if (tag) tokens.push(<span key={m.index} style={{ color: "#89ddff" }}>{full}</span>);
    else if (component) tokens.push(<span key={m.index} style={{ color: "#ffcb6b" }}>{full}</span>);
    else if (punct) tokens.push(<span key={m.index} style={{ color: "#89ddff" }}>{full}</span>);
    else tokens.push(<span key={m.index}>{full}</span>);
    lastIndex = m.index + full.length;
  }
  if (lastIndex < line.length) tokens.push(<span key={lastIndex}>{line.slice(lastIndex)}</span>);
  return tokens;
}

// ── JSX VIEWER CONTENT ────────────────────────────────────────
function JsxViewerContent({ file }) {
  const code = JSX_CONTENT[file.name] || generateDefaultJsx(file);
  const [copied, setCopied] = useState(false);

  const handleCopy = () => {
    navigator.clipboard.writeText(code).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  };

  return (
    <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: "#0d1117", position: "relative" }}>
      {/* toolbar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 14px", background: "#161b22", borderBottom: "1px solid #21262d", flexShrink: 0 }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, letterSpacing: 1.5, color: "#6e7681", textTransform: "uppercase" }}>
          {file.ext === "JPG" || file.ext === "PNG" ? "JSX" : file.ext === "PDF" ? "JS" : file.ext === "DWG" ? "JS" : "JS"} · {file.name}
        </span>
        <button
          onClick={handleCopy}
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, letterSpacing: 1, color: copied ? "#3fb950" : "#6e7681", background: "none", border: "none", cursor: "pointer", padding: "2px 6px", transition: "color 0.2s" }}
        >
          {copied ? "COPIED" : "COPY"}
        </button>
      </div>
      {/* code */}
      <div style={{ flex: 1, overflowY: "auto", overflowX: "auto", padding: "16px 0", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, lineHeight: "1.6", color: "#e6edf3", background: "#0d1117" }}>
        <div style={{ minWidth: "max-content", paddingRight: 24 }}>
          {highlight(code)}
        </div>
      </div>
    </div>
  );
}

// ── DRAGGABLE WINDOW ─────────────────────────────────────────
function Window({ id, title, style, onClose, onExpand, breadcrumb, children, onMouseDownCapture, noPadding }) {
  const ref = useRef(null);
  const drag = useRef(null);
  const scrollRef = useRef(null);
  const trackRef = useRef(null);
  const [scrollRatio, setScrollRatio] = useState({ top:0, size:1 });
  const [pos, setPos] = useState({ left: style.left, top: style.top, width: style.width, height: style.height, expanded: false, prev: null });

  const handleScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    const ratio = el.scrollTop / (el.scrollHeight - el.clientHeight || 1);
    const size = el.clientHeight / el.scrollHeight;
    setScrollRatio({ top: ratio, size });
  };

  useEffect(() => { handleScroll(); }, [children]);

  const onThumbDown = e => {
    e.preventDefault();
    const el = scrollRef.current;
    const track = trackRef.current;
    if (!el || !track) return;
    const startY = e.clientY;
    const startScroll = el.scrollTop;
    const trackH = track.clientHeight;
    const scrollH = el.scrollHeight;
    const clientH = el.clientHeight;
    const thumbH = Math.max(20, (clientH / scrollH) * trackH);
    const availableTrack = trackH - thumbH;
    const onMove = ev => {
      const dy = ev.clientY - startY;
      el.scrollTop = startScroll + (dy / availableTrack) * (scrollH - clientH);
    };
    const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const MARGIN = 8;
  const trackH = trackRef.current ? trackRef.current.clientHeight - MARGIN * 2 : 200;
  const thumbH = 70;
  const availableTrack = trackH - thumbH;
  const thumbTop = MARGIN + scrollRatio.top * availableTrack;

  const onMouseDown = useCallback(e => {
    if (e.target.closest("[data-btn]")) return;
    e.preventDefault();
    const r = ref.current.getBoundingClientRect();
    drag.current = { ox: e.clientX - r.left, oy: e.clientY - r.top };
    document.body.style.userSelect = "none";
  }, []);

  useEffect(() => {
    const onMove = e => {
      if (!drag.current) return;
      setPos(p => ({ ...p, left: Math.max(0, e.clientX - drag.current.ox), top: Math.max(0, e.clientY - drag.current.oy) }));
    };
    const onUp = () => {
      drag.current = null;
      document.body.style.userSelect = "";
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const handleExpand = () => {
    if (pos.expanded) {
      setPos({ ...pos.prev, expanded: false, prev: null });
    } else {
      setPos({ left: 0, top: 38, width: "100%", height: "calc(100vh - 38px)", expanded: true, prev: pos });
    }
  };

  return (
    <div ref={ref} onMouseDownCapture={onMouseDownCapture} style={{ ...S.winWrap, left: pos.left, top: pos.top, width: pos.width, height: pos.height, zIndex: style.zIndex || 10 }}>
      <div style={S.winBar} onMouseDown={onMouseDown}>
        <BtnClose onClick={onClose} />
        {onExpand && <BtnExpand onClick={handleExpand} />}
        <span style={S.winBarTitle}>{title}</span>
      </div>
      <div ref={trackRef} style={{ ...S.winBody }}>
        {breadcrumb && <div style={S.breadcrumb}>{breadcrumb}</div>}
        <div style={{ flex:1, minHeight:0, display:"flex", flexDirection:"row", overflow:"hidden" }}>
          {noPadding ? (
            <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column" }}>{children}</div>
          ) : (
            <div className="win-scroll" style={{ ...S.scrollArea, flex:1, scrollbarWidth:"none", msOverflowStyle:"none" }} ref={scrollRef} onScroll={handleScroll}>{children}</div>
          )}
        </div>
        {!noPadding && scrollRatio.size < 1 && (
          <div
            style={{ position:"absolute", right:4, width:4, borderRadius:99, background:"#e8b4b4", cursor:"pointer", top: thumbTop + "px", height: thumbH + "px" }}
            onMouseDown={onThumbDown}
          />
        )}
      </div>
    </div>
  );
}

function AdaptiveViewerWindow({ win, currentFile, proj, folder, closeWindow, bringToFront, openDossier, openProjet, setFs, navigate, setWindows }) {
  const BAR_H = 38;
  const CRUMB_H = 28;
  const HEADER_H = 61;
  const MARGIN = 16;
  const H = Math.round(window.innerHeight * 0.45);
  const W = Math.round(H * 1.2);
  const TOP_OFFSET = 0;

  const imgSrc = getImageSrc(currentFile?.name);

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const rawLeft = 260 + (win.offsetX || 0);
  const rawTop = 8 + (win.offsetY || 0);
  const left = Math.max(4, Math.min(rawLeft, vw - W - 8));
  const top = Math.max(0, Math.min(rawTop, vh - HEADER_H - H - 16));

  const [pos, setPos] = useState({ left, top });
  const dragRef = useRef(null);

  const onBarMouseDown = e => {
    if (e.target.closest("[data-btn]")) return;
    e.preventDefault();
    bringToFront(win.id);
    document.body.style.userSelect = "none";
    dragRef.current = { ox: e.clientX - pos.left, oy: e.clientY - pos.top };
    const onMove = ev => {
      if (!dragRef.current) return;
      const container = ev.target.closest ? document.querySelector('[data-desktop]') : null;
      setPos({ left: Math.max(0, ev.clientX - dragRef.current.ox), top: Math.max(0, ev.clientY - dragRef.current.oy - HEADER_H) });
    };
    const onUp = () => {
      dragRef.current = null;
      document.body.style.userSelect = "";
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  return (
    <div onMouseDown={() => bringToFront(win.id)} style={{ position:"absolute", left: pos.left + "px", top: pos.top + "px", width: W + "px", height: H + "px", display:"flex", flexDirection:"column", zIndex: win.zIndex, boxShadow:"2px 2px 8px rgba(162,28,38,0.12)", overflow:"hidden", pointerEvents:"auto" }}>

      <div onMouseDown={onBarMouseDown} style={{ height:BAR_H, flexShrink:0, background:"#fff", border:"1.25px solid #a21c26", borderBottom:"1.25px solid #a21c26", borderRadius:"4px 4px 0 0", display:"flex", alignItems:"center", padding:"0 8px", gap:7, cursor:"grab", position:"relative", userSelect:"none" }}>

let nextId = 1;
let nextZ = 10;

function App() {
  const [windows, setWindows] = useState([]);
  const [fs, setFs] = useState(null);

  const bringToFront = id => {
    nextZ++;
    const z = nextZ;
    setWindows(ws => ws.map(w => w.id === id ? { ...w, zIndex: z } : w));
  };

  const closeWindow = id => setWindows(ws => ws.filter(w => w.id !== id));

  const openDossier = folderId => {
    const existing = windows.find(w => w.type === "dossier" && w.folderId === folderId);
    if (existing) { bringToFront(existing.id); return; }
    nextZ++; nextId++;
    setWindows(ws => [...ws, { id: nextId, type:"dossier", folderId, zIndex: nextZ }]);
  };

  const openProjet = (folderId, projId, projName) => {
    const existing = windows.find(w => w.type === "projet" && w.projId === projId);
    if (existing) { bringToFront(existing.id); return; }
    nextZ++; nextId++;
    setWindows(ws => [...ws, { id: nextId, type:"projet", folderId, projId, projName, zIndex: nextZ }]);
  };

  const openViewer = (folderId, projId, projName, fileIdx) => {
    const id = ++nextId;
    const z = ++nextZ;
    const count = windows.filter(w => w.type === "viewer").length;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const H = Math.round(vh * 0.45);
    const W = Math.round(H * 1.2);
    const cols = 2;
    const col = count % cols;
    const row = Math.floor(count / cols);
    const jitterX = Math.round((Math.random() - 0.5) * 80);
    const jitterY = Math.round((Math.random() - 0.5) * 60);
    const offsetX = col * Math.round(W * 0.85) + jitterX;
    const offsetY = row * Math.round(H * 0.85) + jitterY;
    setWindows(ws => {
      const minViewerZ = Math.min(...ws.filter(w => w.type === "viewer").map(w => w.zIndex), z);
      return [
        ...ws.map(w =>
          (w.type === "dossier" && w.folderId === folderId) || (w.type === "projet" && w.projId === projId)
            ? { ...w, zIndex: Math.min(w.zIndex, minViewerZ - 1) }
            : w
        ),
        { id, type:"viewer", folderId, projId, projName, fileIdx, zIndex: z, offsetX, offsetY }
      ];
    });
  };

  useEffect(() => {
    if (!fs) return;
    const proj = getProj(fs.projId);
    const h = e => {
      if (e.key === "ArrowRight") setFs(s => ({ ...s, fileIdx: (s.fileIdx + 1) % proj.files.length }));
      if (e.key === "ArrowLeft")  setFs(s => ({ ...s, fileIdx: (s.fileIdx - 1 + proj.files.length) % proj.files.length }));
      if (e.key === "Escape") setFs(null);
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [fs]);

  return (
    <div style={S.root} onDragStart={e => e.preventDefault()}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet"/>
      <style>{`.win-scroll::-webkit-scrollbar { display: none; } *, *:focus, *:active { outline: none !important; -webkit-tap-highlight-color: transparent; } html, body, #root { height: 100%; margin: 0; padding: 0; } img, svg { -webkit-user-drag: none; user-select: none; } `}</style>

      <div style={{ display:"flex", flexDirection:"column", position:"absolute", inset:0 }}>
        <header style={S.header}>
          <div style={{ ...S.logo }} onClick={() => setWindows([])}>La Slack</div>
        </header>
        <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
          <DotBg/>

          {["architecture","objects","graphicdesign"].map((fid, i) => {
            const positions = [
              { left:"8%", top:"6%" },
              { right:"12%", top:"15%" },
              { left:"22%", bottom:"8%" },
            ];
            const labels = ["ARCHITECTURE","OBJECTS","GRAPHIC DESIGN"];
            const zIndexes = [3, 2, 1];
            const dimmed = windows.length > 0;
            return (
              <div key={fid}
                onClick={dimmed ? undefined : () => openDossier(fid)}
                style={{ ...S.deskIcon, ...positions[i], opacity: dimmed ? 0.18 : 1, pointerEvents: dimmed ? "none" : "auto", zIndex: zIndexes[i] }}
                onMouseEnter={e => { if (!dimmed) e.currentTarget.querySelector("svg").style.transform = "translateY(-6px)"; }}
                onMouseLeave={e => { if (!dimmed) e.currentTarget.querySelector("svg").style.transform = "none"; }}
              >
                <FolderSVG w={350} h={269} sw={1.25}/>
                <div style={S.deskLabel}>{labels[i]}</div>
              </div>
            );
          })}
          <div
            onClick={windows.length > 0 ? undefined : () => openDossier("dump")}
            style={{ ...S.deskIcon, right:"1%", bottom:"2%", opacity: windows.length > 0 ? 0.18 : 1, pointerEvents: windows.length > 0 ? "none" : "auto", zIndex: 0 }}
            onMouseEnter={e => { if (!windows.length) e.currentTarget.querySelector("svg").style.transform = "translateY(-6px)"; }}
            onMouseLeave={e => { if (!windows.length) e.currentTarget.querySelector("svg").style.transform = "none"; }}
          >
            <DumpSVG w={175} h={230} sw={1.25}/><div style={S.deskLabel}>DUMP</div>
          </div>

          {windows.map(win => {
            const folder = FOLDERS[win.folderId] || {};
            const proj = win.projId ? getProj(win.projId) : null;

            if (win.type === "dossier") {
              return (
                <div key={win.id} style={{ position:"absolute", inset:0, pointerEvents:"none", zIndex: win.zIndex }}>
                  <Window
                    title={folder.label}
                    style={{ left:"20px", top:"16px", width:"640px", height:"391px", zIndex: win.zIndex }}
                    onClose={() => closeWindow(win.id)}
                    onMouseDownCapture={() => bringToFront(win.id)}
                    breadcrumb={
                      <Breadcrumb parts={[
                        { label:"Bureau", onClick:() => setWindows([]) },
                        { label: folder.label },
                      ]}/>
                    }
                  >
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 160px)", columnGap:36, rowGap:8, padding:"0px 0", padding:"0px 0", marginTop:-11, justifyContent:"center", paddingBottom:10 }}>
                      {(folder.sub || []).map(sub => (
                        <div key={sub.id}
                          onClick={() => openProjet(win.folderId, sub.id, sub.name)}
                          style={{ display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", padding:8 }}
                          onMouseEnter={e => e.currentTarget.querySelector("svg").style.transform="translateY(-3px)"}
                          onMouseLeave={e => e.currentTarget.querySelector("svg").style.transform="none"}
                        >
                          <FolderSVG w={160} h={123} sw={2.4}/>
                          <div style={{ ...S.deskLabel, fontSize:9, marginTop:10, fontWeight:500 }}>{sub.name}</div>
                        </div>
                      ))}
                    </div>
                  </Window>
                </div>
              );
            }

            if (win.type === "projet") {
              return (
                <div key={win.id} style={{ position:"absolute", inset:0, pointerEvents:"none", zIndex: win.zIndex }}>
                  <Window
                    title={win.projName}
                    style={{ left:"52px", top:"42px", width:"640px", height:"410px", zIndex: win.zIndex }}
                    onClose={() => closeWindow(win.id)}
                    onMouseDownCapture={() => bringToFront(win.id)}
                    breadcrumb={
                      <Breadcrumb parts={[
                        { label:"Bureau", onClick:() => setWindows([]) },
                        { label: folder.label, onClick:() => openDossier(win.folderId) },
                        { label: win.projName },
                      ]}/>
                    }
                  >
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 100px)", columnGap:42, rowGap:16, marginLeft:-50, marginRight:-50, marginTop:-3, justifyContent:"center" }}>
                      {proj.files.map((f, i) => {
                        const isImg = ["JPG","PNG","JPEG"].includes(f.ext.toUpperCase());
                        const isPdf = f.ext.toUpperCase() === "PDF";
                        const thumbSrc = isImg ? getImageSrc(f.name) + "?w=80" : null;
                        const isDump = win.folderId === "dump";
                        const seed = f.name.split("").reduce((a,c) => a + c.charCodeAt(0), 0);
                        const rot = isDump ? ((seed % 21) - 10) : 0;
                        const tx = isDump ? ((seed * 7) % 30) - 15 : 0;
                        const ty = isDump ? ((seed * 13) % 20) - 10 : 0;
                        return (
                          <div key={i}
                            onClick={() => {
                              if (isPdf) { window.open(getImageSrc(f.name) || `https://raw.githubusercontent.com/kselaven-del/portfolio-architecture/main/${encodeURIComponent(f.name)}`, "_blank"); }
                              else { openViewer(win.folderId, win.projId, win.projName, i); }
                            }}
                            style={{ display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", padding:4, transform: `rotate(${rot}deg) translate(${tx}px,${ty}px)`, transition:"transform 0.15s", zIndex: isDump ? seed % 5 : "auto", position: isDump ? "relative" : "static" }}
                            onMouseEnter={e => { e.currentTarget.style.transform = isDump ? `rotate(${rot}deg) translate(${tx}px,${ty}px) scale(1.08)` : "translateY(-2px)"; e.currentTarget.style.zIndex = 99; }}
                            onMouseLeave={e => { e.currentTarget.style.transform = isDump ? `rotate(${rot}deg) translate(${tx}px,${ty}px)` : "none"; e.currentTarget.style.zIndex = isDump ? seed % 5 : "auto"; }}
                          >
                            {thumbSrc ? (
                              <img
                                src={thumbSrc}
                                alt={f.name}
                                style={{ width:108, height:130, objectFit:"contain", display:"block", imageRendering:"pixelated", transition:"transform 0.15s" }}
                                onError={e => { e.target.style.display="none"; e.target.nextSibling.style.display="block"; }}
                              />
                            ) : null}
                            <div style={{ display: thumbSrc ? "none" : "block" }}>
                              <FileIcon ext={f.ext} w={108} h={130}/>
                            </div>
                            <div style={{ ...S.deskLabel, fontSize:9, marginTop:10, fontWeight:500, maxWidth:"108px" }}>{f.name}</div>
                          </div>
                        );
                      })}
                    </div>
                  </Window>
                </div>
              );
            }

            if (win.type === "viewer") {
              const currentFile = proj.files[win.fileIdx];
              const navigate = (dir) => {
                const newIdx = (win.fileIdx + dir + proj.files.length) % proj.files.length;
                setWindows(ws => ws.map(w => w.id === win.id ? { ...w, fileIdx: newIdx } : w));
              };
              return (
                <div key={win.id} style={{ position:"absolute", inset:0, pointerEvents:"none", zIndex: win.zIndex }}>
                  <AdaptiveViewerWindow
                    win={win}
                    currentFile={currentFile}
                    proj={proj}
                    folder={folder}
                    closeWindow={closeWindow}
                    bringToFront={bringToFront}
                    openDossier={openDossier}
                    openProjet={openProjet}
                    setFs={setFs}
                    navigate={navigate}
                    setWindows={setWindows}
                  />
                </div>
              );
            }

            return null;
          })}
        </div>
      </div>

      {/* FULLSCREEN */}
      {fs && (() => {
        const proj = getProj(fs.projId);
        const currentFile = proj.files[fs.fileIdx];
        const imgSrc = getImageSrc(currentFile?.name);
        return (
          <div style={{ position:"fixed", top:61, left:0, right:0, bottom:0, background:"#fff", zIndex:9999, display:"flex", flexDirection:"column", overflow:"hidden", borderTop:"1.25px solid #a21c26" }}>
            {/* Barre top avec ligne rouge */}
            <div style={{ height:38, background:"#fff", borderBottom:"1.25px solid #a21c26", display:"flex", alignItems:"center", padding:"0 8px", gap:7, flexShrink:0, position:"relative" }}>
              <BtnClose onClick={() => setFs(null)} />
              <div style={{ position:"absolute", left:80, right:12, top:"50%", transform:"translateY(-50%)", display:"flex", alignItems:"center", justifyContent:"flex-end", fontSize:9, fontWeight:700, letterSpacing:1, color:"#c97a7a", overflow:"hidden", whiteSpace:"nowrap" }}>
                {[
                  { label:"Bureau" },
                  { label: fs.folderId ? FOLDERS[fs.folderId]?.label : "" },
                  { label: fs.projName },
                  { label: currentFile.name },
                ].filter(p => p.label).map((p, i, arr) => {
                  const isLast = i === arr.length - 1;
                  return (
                    <span key={i} style={{ display:"flex", alignItems:"center", flexShrink: isLast ? 0 : 1, minWidth:0, overflow:"hidden" }}>
                      {i > 0 && <span style={{ color:"#f0d0d0", margin:"0 4px", flexShrink:0 }}>{"›"}</span>}
                      <span title={p.label} style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth: isLast ? "none" : "120px", color: isLast ? "#a21c26" : "#c97a7a" }}>{p.label}</span>
                    </span>
                  );
                })}
              </div>
            </div>
            {/* Image + flèches collées à l'image */}
            <div style={{ flex:1, minHeight:0, overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center", background:"#fff", position:"relative" }}>
              <div style={{ position:"relative", display:"flex", alignItems:"center", justifyContent:"center", width:"100%", height:"100%", padding:"16px 48px", boxSizing:"border-box" }}>
                {imgSrc ? (
                  <img src={imgSrc} alt={currentFile.name} draggable="false" style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block" }}/>
                ) : (
                  <div style={{ width:300, height:300, display:"flex", alignItems:"center", justifyContent:"center", background:"repeating-linear-gradient(45deg,#e8e8e3,#e8e8e3 8px,#ddd 8px,#ddd 16px)" }}>
                    <FileIcon ext={currentFile.ext} w={120} h={144}/>
                  </div>
                )}

              </div>
            </div>
            {/* Thumbnails sans bordure */}
            <div style={{ height:76, background:"#fff", borderTop:"1.25px solid #a21c26", display:"flex", gap:8, padding:"8px 14px", overflowX:"auto", flexShrink:0, alignItems:"center" }}>
              {proj.files.map((f,i) => {
                const tSrc = getImageSrc(f.name);
                return (
                  <div key={i} onClick={() => setFs(s => ({ ...s, fileIdx:i }))}
                    style={{ width:58, height:58, flexShrink:0, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", background:"#fff", overflow:"hidden", opacity: i===fs.fileIdx ? 1 : 0.45, transition:"opacity 0.15s" }}>
                    {tSrc ? (
                      <img src={tSrc + "?w=80"} alt={f.name} style={{ width:"100%", height:"100%", objectFit:"cover", imageRendering:"pixelated" }}/>
                    ) : (
                      <FileIcon ext={f.ext} w={36} h={43}/>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
