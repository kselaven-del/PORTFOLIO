const encodeFilename = (name) => name.split("/").map(s => encodeURIComponent(s.normalize("NFC"))).join("/");
const getImageSrc = (name) => {
  if (!name) return null;
  const ext = name.split(".").pop().toUpperCase();
  if (IMAGE_EXTS.includes(ext)) {
    let base = GITHUB_BASE;
    if (DUMP_FILES.has(name)) base = GITHUB_DUMP;
    else if (GD_FILES.has(name))  base = GITHUB_GD;
    else if (OBJ_FILES.has(name)) base = GITHUB_OBJ;
    return base + encodeFilename(name);

};

const DESCRIPTIONS = {
  ar14: "AR14 - Fondazione Berio\n\nThe Fondazione Berio is a theoretical project for a public building designed to archive sound documents for RAI (Radiotelevisione Italiana). It appears as a large treasure chest, a blind box where functional archive spaces, sound production and restoration areas, and listening and consultation spaces coexist.\n\nThe building follows a clear spatial organisation. The ground floor, framed by eight imposing concrete shafts, houses an open, multi-purpose space including a café, a terrace, a reception area and a cloakroom. On the first floor, the main space, a large atrium, is surrounded by a ring of individual listening spaces on which rest seven floors of archives and a level dedicated to the production and restoration of sound documents.\n\nThe emblematic feature of the building is a modular acoustic ceiling that hangs over the atrium. Able to be adjusted in height, it transforms the atrium into an auditorium, allowing sound content to be broadcast under controlled and varied acoustic conditions. The project pays particular attention to detail, with the edges of the archive compactors designed as acoustic panels, and the handrails in the archive spaces also serving as technical trellises for the sound and lighting equipment. Choices that reflect a desire for balance and dialogue between the different functions of the building, where each programme enriches the other. The Fondazione Berio thus stands for a harmonious cohabitation between storage and listening, designed to enhance the experience of sound archives within a coherent whole.",
  ar09: "AR09 - UN GRAND ESPACE COMMUN\n\nAs part of this exercise, we focused on the theme of collective housing. Our work was anchored in a real-life case by examining a project studied by the small commune of Burtigny, Switzerland, for a collective housing initiative in the heart of the village.\n\nTo achieve this, we began with an initial study phase in which each group analyzed an activity such as cooking, washing, or working, and how these activities were expressed in collective housing projects across different eras and scales.\n\nIn the second phase, we worked closely with the village residents to imagine a project aligned with the community's expectations, working across various scales, from site analysis to 1:1 construction details.\n\nThe main idea of this project was to explore three degrees of privacy articulated within a housing building.",
  ar12: "AR12 - Constructing the view\n\nThis section explores a creative process in which architectural representation becomes a genuine narrative tool. Using digital techniques ranging from Photoshop collage to Cinema 4D rendering, each work was produced as part of Philipp Schaerer's 'Constructing the View' course at EPFL.\n\nThe collages and digital compositions combine to question and transcend conventional modes of representation, while the Cinema 4D renders emphasise attention to texture, light and spatial staging.\n\nTogether, these works highlight a commitment to exploring the possibilities offered by the image in the context of architecture.",
  ar00: "AR00 - Interior model\n\nThis series of photographs documents the interior of architectural models, capturing the subtle interplay between light, materiality and scale. Shot from within the models themselves, the images convey a sense of immersion and reveal carefully constructed atmospheres that go beyond the object itself.",
  ar15: "AR15 Superstudio\n\nSuperstudio A was a research studio led by Pier Vittorio Aureli at EPFL, dedicated to the study of the villa as an architectural type from antiquity to the twentieth century. Rather than designing, students close-read a selected case study and produce an Analogous Map: an 80×80cm line drawing that functions as a visual essay, situating a building within its historical, formal and ideological context.\n\nOur group worked on Le Corbusier's villas of the 1920s, exploring the dialectic between his theoretical models - the Maison Dom-Ino and the Maison Citrohan - and their material realisation in built works. Through the analysis of the Villa Stein-de Monzie and the Villa Baizeau, and through the lens of Le Corbusier's own Four Compositions diagram, the essay traces how abstract structural principles found spatial and sensory form. The accompanying text of 1,500 words develops this argument in parallel.",
  ar02: "AR02 - The Real Book\n\nThe Real Book is an 828-page publication conceived by first-year architecture students at EPFL under the guidance of the ALICE laboratory (Atelier de la Conception de l'Espace), born out of the COVID-19 confinement of spring 2020. It documents the work that would have taken shape along the banks of the Rhône and Arve rivers in Geneva — a collective project reimagined through drawings, collages and digital representations — and was later selected as one of the most beautiful Swiss books by the Federal Office of Culture. I contributed to this collective endeavour as a first-year student.",
  ar10: "AR10 - Stage Depeyre Morand Architectures\n\nA first six-month internship with the Parisian architectural firm Depeyre Morand Architectures proved to be an enriching immersion in the world of architecture. This multi-disciplinary experience was distinguished by the diversity of the assignments entrusted to us, enabling us to develop a wide range of skills, from graphic design to the processing of administrative documents.\n\nAmong the projects carried out during this period, illustrative posters were designed to present a garden project for a sheltered residence. These visuals were intended to showcase the efforts made to create a garden in the residents' own image, which they would be able to care for themselves.\n\nA series of summary models in plaster and brass was also produced. These models, precise and detailed, illustrated a succession of punctual interventions within the city of Paris.\n\nOne notable assignment was to draw up a preliminary design for an extension including six apartments for a sheltered residence. This work involved the preliminary stages of design, from site analysis to the formulation of architectural proposals, while integrating regulatory constraints and the needs of future occupants.",
  ar11: "AR11 - Le Meraviglie\n\nThe focus of this semester was to look at the Xyllela Fastidiosa epidemic, which for over ten years has been ravaging olive groves that are hundreds and sometimes thousands of years old, forming the landscape and guaranteeing the economic functioning of Puglia, in order to question the potential and place of architecture faced with such a catastrophe.\n\nThe entire studio began by immersing itself in the context through an exercise consisting in reproducing a work by the artist and architect Ugo La Pietra, whose practice is based inter alia on a critique of the relationship between man and the city, questioning the limits of domesticity and demonstrating a certain sensitivity to the Apulian territory, its culture, its materials and its know-how. For my part, I copied the 'Leaf Chair', a fragment of a collection of organically shaped steel outdoor furniture.\n\nBased on our research and reflections, we worked in pairs to come up with an architectural project. \"The Meraviglie\" would be a park located to the west of the town of Ostuni, which is still relatively untouched by the epidemic. The park would include a pavilion and a series of built interventions, such as benches, kiosks, roads and paths, which would lead residents, farmers and visitors through forests, gardens, ruins and healthy, diseased or recently planted olive groves. It would offer a contemplative experience, an opportunity to raise awareness of the damage caused by the disease, as well as the alternatives envisaged to deal with it.",
};

function CustomScrollbar({ scrollRef, thumbH = 48 }) {
  const [thumbTop, setThumbTop] = React.useState(0);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const update = () => {
      const { scrollTop, scrollHeight, clientHeight } = el;
      if (scrollHeight <= clientHeight) { setVisible(false); return; }
      setVisible(true);
      const trackH = clientHeight - thumbH;
      const ratio = scrollTop / (scrollHeight - clientHeight);
      const raw = ratio * trackH;
      setThumbTop(Math.min(Math.max(raw, 10), clientHeight - thumbH - 10));
    };
    el.addEventListener("scroll", update);
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => { el.removeEventListener("scroll", update); ro.disconnect(); };
  }, [scrollRef, thumbH]);
  if (!visible) return null;
  return (
    <div style={{ width:4, position:"relative", margin:"0 9px 0 0", flexShrink:0, alignSelf:"stretch" }}>
      <div style={{ position:"absolute", top:thumbTop, left:0, width:3, height:48, background:"#fff", borderRadius:99, border:"1.25px solid #851f20" }}/>
    </div>
  );
}

function Window({ title, style, onClose, onExpand, breadcrumb, children, onMouseDownCapture }) {
  const ref = useRef(null);
  const scrollRef = useRef(null);
  const drag = useRef(null);
  const [pos, setPos] = useState({ left: style.left, top: style.top, width: style.width, height: style.height });

  const onMouseDown = useCallback(e => {
    if (e.target.closest("[data-btn]")) return;
    e.preventDefault();
    const r = ref.current.getBoundingClientRect();
    drag.current = { ox: e.clientX - r.left, oy: e.clientY - r.top };
    document.body.style.userSelect = "none";
  }, []);

  useEffect(() => {
    const onMove = e => { if (!drag.current) return; setPos(p => ({ ...p, left: Math.max(0, e.clientX - drag.current.ox), top: Math.max(0, e.clientY - drag.current.oy) })); };
    const onUp = () => { drag.current = null; document.body.style.userSelect = ""; };
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const onWheel = useCallback(e => {
    if (scrollRef.current) scrollRef.current.scrollTop += e.deltaY;
  }, []);

  return (
    <div ref={ref} onMouseDownCapture={onMouseDownCapture} onWheel={onWheel} style={{ ...S.winWrap, left: pos.left, top: pos.top, width: pos.width, height: pos.height, zIndex: style.zIndex || 10 }}>
      <div style={S.winBar} onMouseDown={onMouseDown}>
        <BtnClose onClick={onClose} style={{ marginTop:-2 }} />
        {onExpand && <BtnExpand onClick={onExpand} />}
        <span style={S.winBarTitle}>{title}</span>
      </div>
      <div style={{ ...S.winBody }}>
        {breadcrumb && <div style={S.breadcrumb}>{breadcrumb}</div>}
        <div style={{ flex:1, minHeight:0, overflow:"hidden", display:"flex" }}>
          <div className="win-scroll" ref={scrollRef} style={{ ...S.scrollArea, flex:1, scrollbarWidth:"none", paddingTop: breadcrumb ? 28 : 8 }}>{children}</div>
          <CustomScrollbar scrollRef={scrollRef} thumbH={48} />
        </div>
      </div>
    </div>
  );
}

function DumpWindow({ win, closeWindow, bringToFront, openViewer }) {
  const W = Math.round(window.innerWidth * 0.8), H = Math.round(window.innerHeight * 0.8);
  const left = Math.round((window.innerWidth - W) / 2), top = Math.round((window.innerHeight - H) / 2 - 30);
  const files = FOLDERS.dump.files || [];
  const initPos = useRef(null);
  if (!initPos.current) {
    initPos.current = files.map((f, i) => {
      const seed = f.name.split("").reduce((a,c) => a + c.charCodeAt(0), i * 37);
      return { x: 60 + (seed * 137) % (W - 200), y: 60 + (seed * 97) % (H - 220), rot: ((seed % 21) - 10) };
    });
  }
  const [positions, setPositions] = useState(initPos.current);

  const onFileMouseDown = (e, idx) => {
    e.stopPropagation(); e.preventDefault();
    const startX = e.clientX, startY = e.clientY, origX = positions[idx].x, origY = positions[idx].y;
    let moved = false;
    const onMove = ev => { const dx = ev.clientX-startX, dy = ev.clientY-startY; if (!moved && Math.sqrt(dx*dx+dy*dy)>4) moved=true; if(moved) setPositions(ps=>ps.map((p,i)=>i===idx?{...p,x:origX+dx,y:origY+dy}:p)); };
    const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); if(!moved) openViewer("dump","dump","DUMP",idx); };
    window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
  };

  return (
    <div onMouseDown={() => bringToFront(win.id)} style={{ position:"absolute", left, top, width:W, height:H, display:"flex", flexDirection:"column", zIndex:win.zIndex, overflow:"hidden", pointerEvents:"auto", border:"1.25px solid #a21c26", borderRadius:4, background:"#fff" }}>
      <div style={{ height:27, flexShrink:0, background:"#fff", borderBottom:"1.25px solid #a21c26", display:"flex", alignItems:"center", padding:"0 8px", gap:7, position:"relative" }}>
        <BtnClose onClick={() => closeWindow(win.id)} />
        <span style={{ position:"absolute", right:12, fontFamily:"'IBM Plex Mono',monospace", fontSize:14, fontWeight:400, fontStyle:"italic", letterSpacing:0.3, color:"#a21c26", top:"50%", transform:"translateY(-50%)" }}>DUMP</span>
      </div>
      <div style={{ flex:1, overflow:"hidden", position:"relative" }}>
        {files.map((f, i) => {
          const pos = positions[i] || { x:60+i*30, y:60+i*20, rot:0 };
          const thumbSrc = getImageSrc(f.name);
          return (
            <div key={i} onMouseDown={(e) => onFileMouseDown(e, i)} style={{ position:"absolute", left:pos.x, top:pos.y, transform:`rotate(${pos.rot}deg)`, cursor:"grab", userSelect:"none", display:"flex", flexDirection:"column", alignItems:"center", width:120 }}>
              {thumbSrc ? <img src={thumbSrc} draggable="false" style={{ width:108, height:130, objectFit:"cover", display:"block", filter:"drop-shadow(0px 4px 12px rgba(0,0,0,0.18))" }}/> : <FileIcon ext={f.ext} w={108} h={130}/>}
              <div style={{ fontSize:18, fontWeight:400, fontStyle:"italic", color:"#a21c26", marginTop:6, fontFamily:"'IBM Plex Mono',monospace", letterSpacing:0.3, maxWidth:186, textAlign:"center", lineHeight:1.3 }}>{f.name}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ViewerWindow({ win, closeWindow, bringToFront, openDossier, openProjet, setFs, navigate }) {
  const proj = getProj(win.projId);
  const currentFile = proj.files[win.fileIdx];
  const imgSrc = getImageSrc(currentFile?.name);
  const FIXED_H = Math.round(window.innerHeight * 0.50);
  const defaultW = Math.round(FIXED_H * 1.2);
  const vw = window.innerWidth;
  const vh = window.innerHeight - 76; // minus header
  const [pos, setPos] = useState({ left: Math.min(Math.max(4, win.offsetX || 0), vw - defaultW - 4), top: Math.min(Math.max(0, win.offsetY || 0), vh - FIXED_H - 4) });
  const [size, setSize] = useState({ w: defaultW, h: FIXED_H });
  const [ready, setReady] = useState(!imgSrc);
  const userResized = useRef(false);
  const folder = FOLDERS[win.folderId] || {};

  useEffect(() => { if (imgSrc) setReady(false); }, [currentFile?.name]);

  const handleImageLoad = useCallback((e) => {
    if (!userResized.current) {
      const { naturalWidth, naturalHeight } = e.target;
      if (naturalWidth && naturalHeight) {
        const idealW = Math.round((FIXED_H - 80) * naturalWidth / naturalHeight + 32);
        setSize(s => ({ ...s, w: Math.max(220, Math.min(idealW, vw - 16)) }));
      }
    }
    setReady(true);
  }, [FIXED_H, vw]);

  const onBarMouseDown = e => {
    if (e.target.closest("[data-btn]")) return;
    e.preventDefault();
    bringToFront(win.id);
    const startX = e.clientX - pos.left, startY = e.clientY - pos.top;
    const onMove = ev => setPos({ left: Math.min(Math.max(0, ev.clientX - startX), vw - size.w - 4), top: Math.min(Math.max(0, ev.clientY - startY), vh - size.h - 4) });
    const onUp = () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
  };

  return (
    <div onMouseDown={() => bringToFront(win.id)} style={{ position:"absolute", left:pos.left, top:pos.top, width:size.w, height:size.h, zIndex:win.zIndex, pointerEvents:"auto", display:"flex", flexDirection:"column", opacity:ready?1:0, transition:ready?"opacity 0.12s ease":"none" }}>
      <div onMouseDown={onBarMouseDown} style={{ height:27, flexShrink:0, background:"#fff", border:"1.25px solid #a21c26", borderBottom:"1.25px solid #a21c26", borderRadius:"4px 4px 0 0", display:"flex", alignItems:"center", padding:"0 8px", gap:7, cursor:"grab", position:"relative" }}>
        <BtnClose onClick={() => closeWindow(win.id)} />
        <BtnExpand onClick={() => setFs({ projId:win.projId, projName:win.projName, fileIdx:win.fileIdx, folderId:win.folderId })} />
        <span style={{ position:"absolute", right:10, fontFamily:"'IBM Plex Mono',monospace", fontSize:14, fontWeight:400, fontStyle:"italic", letterSpacing:0.3, color:"#a21c26", whiteSpace:"nowrap", overflow:"hidden", maxWidth:"55%", top:"50%", transform:"translateY(-50%)" }}>{currentFile.name}</span>
      </div>
      <div style={{ flex:1, minHeight:0, background:"#fff", border:"1.25px solid #a21c26", borderTop:"none", borderRadius:"0 0 4px 4px", display:"flex", flexDirection:"column", overflow:"hidden" }}>
        <div style={{ height:20, flexShrink:0, display:"flex", alignItems:"center", padding:"4px 12px 0", fontSize:9, fontWeight:700, letterSpacing:1, color:"#c97a7a", overflow:"hidden", whiteSpace:"nowrap" }}>
          <span style={{ cursor:"pointer" }} onClick={() => openDossier(win.folderId)}>{folder.label}</span>
          <span style={{ margin:"0 4px", color:"#f0d0d0" }}>›</span>
          <span style={{ cursor:"pointer" }} onClick={() => openProjet(win.folderId, win.projId, win.projName)}>{win.projName}</span>
          <span style={{ margin:"0 4px", color:"#f0d0d0" }}>›</span>
          <span style={{ color:"#a21c26" }}>{currentFile.name}</span>
        </div>
        <div style={{ flex:1, minHeight:0, display:"flex", alignItems:"center", justifyContent:"center", position:"relative", overflow:"hidden" }}>
          <div onClick={() => navigate(-1)} style={{ position:"absolute", left:0, top:0, bottom:0, width:16, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", zIndex:2 }}>
            <svg width="8" height="16" viewBox="0 0 8 16"><polyline points="7,1 1,8 7,15" fill="none" stroke="#c97a7a" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div style={{ position:"absolute", left:16, right:16, top:0, bottom:8, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
            {imgSrc ? (
              <img key={currentFile.name} src={imgSrc} alt={currentFile.name} draggable="false" onLoad={handleImageLoad} style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block" }}/>
            ) : (
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", width:"100%", height:"100%", background:"#f5f4f4" }}>
                <FileIcon ext={currentFile.ext} w={120} h={144}/>
              </div>
            )}
          </div>
          <div onClick={() => navigate(1)} style={{ position:"absolute", right:0, top:0, bottom:0, width:16, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", zIndex:2 }}>
            <svg width="8" height="16" viewBox="0 0 8 16"><polyline points="1,1 7,8 1,15" fill="none" stroke="#c97a7a" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        </div>
      </div>
    </div>
  );
}

let nextId = 1, nextZ = 10, gridCounter = 0;

function App() {
  const [windows, setWindows] = useState([]);
  const [fs, setFs] = useState(null);
  const [contactOpen, setContactOpen] = useState(false);
  const [cvOpen, setCvOpen] = useState(new Set());
  const [cvZ, setCvZ] = useState(50000);
  const [cvSkY, setCvSkY] = useState(600);

  const bringToFront = id => {
    nextZ = Math.max(nextZ, cvZ) + 1;
    setWindows(ws => ws.map(w => w.id === id ? { ...w, zIndex: nextZ } : w));
  };

  const closeWindow = id => setWindows(ws => {
    const closing = ws.find(w => w.id === id);
    return ws.filter(w => { if (w.id === id) return false; if (closing?.type==="projet" && w.type==="texte" && w.projId===closing.projId) return false; return true; });
  });

  const openDossier = folderId => {
    setCvOpen(new Set());
    const existing = windows.find(w => w.type==="dossier" && w.folderId===folderId);
    if (existing) { bringToFront(existing.id); return; }
    nextZ++; nextId++;
    setWindows(ws => [...ws, { id: nextId, type:"dossier", folderId, zIndex: nextZ }]);
  };

  const openProjet = (folderId, projId, projName) => {
    gridCounter = 0; setCvOpen(new Set());
    const existing = windows.find(w => w.type==="projet" && w.projId===projId);
    if (existing) { bringToFront(existing.id); return; }
    const hasDesc = !!(DESCRIPTIONS[projId] && DESCRIPTIONS[projId].trim());
    nextZ++; nextId++;
    const wins = [{ id: nextId, type:"projet", folderId, projId, projName, zIndex: nextZ }];
    if (hasDesc) { nextZ++; nextId++; wins.push({ id: nextId, type:"texte", folderId, projId, projName, zIndex: nextZ }); }
    setWindows(ws => [...ws, ...wins]);
  };

  const openViewer = (folderId, projId, projName, fileIdx) => {
    const id = ++nextId, z = ++nextZ;
    const vw = window.innerWidth, vh = window.innerHeight;
    const FIXED_H = Math.round(vh * 0.50);
    const defaultW = Math.round(FIXED_H * 1.2);
    const PAD = 12, GRID_X = 52 + 640 + PAD;
    const idx = gridCounter++;
    const rightX = vw - defaultW - PAD, bottomY = vh - FIXED_H - PAD;
    const slots = [{ x:GRID_X, y:PAD }, { x:rightX, y:PAD+35 }, { x:GRID_X+60, y:bottomY }, { x:rightX-60, y:bottomY-40 }];
    let offsetX, offsetY;
    if (idx < 4) { offsetX = slots[idx].x; offsetY = slots[idx].y; }
    else { offsetX = GRID_X + (idx*40)%(rightX-GRID_X); offsetY = PAD + (idx*30)%(bottomY-PAD); }
    offsetX = Math.max(GRID_X, Math.min(offsetX, vw-defaultW-PAD));
    offsetY = Math.max(PAD, Math.min(offsetY, vh-FIXED_H-PAD));
    setWindows(ws => [...ws, { id, type:"viewer", folderId, projId, projName, fileIdx, zIndex: z, offsetX, offsetY }]);
  };

  useEffect(() => {
    if (!fs) return;
    const proj = getProj(fs.projId);
    const h = e => {
      if (e.key === "ArrowRight") setFs(s => ({ ...s, fileIdx: (s.fileIdx+1)%proj.files.length }));
      if (e.key === "ArrowLeft")  setFs(s => ({ ...s, fileIdx: (s.fileIdx-1+proj.files.length)%proj.files.length }));

                        <div key={sub.id} onClick={()=>openProjet(win.folderId,sub.id,sub.name)} style={{ display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", padding:8, paddingBottom:3 }}
                          onMouseEnter={e=>e.currentTarget.querySelector("svg").style.transform="translateY(-3px)"}
                          onMouseLeave={e=>e.currentTarget.querySelector("svg").style.transform="none"}>
                          <FolderSVG w={183} h={148}/>
                          <div style={{ ...S.deskLabel, fontSize:12, marginTop:4, whiteSpace:"normal", maxWidth:183 }}>{sub.name}</div>
                        </div>
                      ))}
                    </div>
                </Window>
              );
            }

            if (win.type==="projet") {
              return (
                <Window key={win.id} title={win.projName} style={{ left:"45px", top:"50px", width:"661px", height:"448px", zIndex:win.zIndex }} onClose={()=>closeWindow(win.id)} onMouseDownCapture={()=>bringToFront(win.id)} breadcrumb={<Breadcrumb parts={[{label:"Bureau",onClick:()=>setWindows([])},{label:folder.label,onClick:()=>openDossier(win.folderId)},{label:win.projName}]}/>}>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 120px)", columnGap:31, rowGap:13, marginTop:-3, paddingLeft:36, paddingRight:32, boxSizing:"border-box", width:"100%" }}>
                      {proj.files.filter(f=>f.ext.toUpperCase()!=="TXT").map((f,i) => {
                        const isImg = ["JPG","PNG","JPEG"].includes(f.ext.toUpperCase());
                        const thumbSrc = isImg ? getImageSrc(f.name) : null;
                        return (
                          <div key={i} onClick={()=>openViewer(win.folderId,win.projId,win.projName,i)} style={{ display:"flex", flexDirection:"column", alignItems:"center", cursor:"pointer", padding:4 }}
                            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";}}
                            onMouseLeave={e=>{e.currentTarget.style.transform="none";}}>
                            {thumbSrc ? <img src={thumbSrc} alt={f.name} style={{ width:120, height:144, objectFit:"contain", display:"block" }} onError={e=>{e.target.style.display="none";}} /> : <FileIcon ext={f.ext} w={120} h={144}/>}
                            <div style={{ ...S.deskLabel, fontSize:9, marginTop:10, fontWeight:500, width:"120px", textAlign:"center", overflow:"hidden" }}>{f.name}</div>
                          </div>
                        );
                      })}
                    </div>
                </Window>
              );
            }

            if (win.type==="texte") return <TextWindow key={win.id} win={win} closeWindow={closeWindow} bringToFront={bringToFront}/>;

            if (win.type==="viewer") {
              const navigate = dir => { const files=getProj(win.projId).files; const newIdx=(win.fileIdx+dir+files.length)%files.length; setWindows(ws=>ws.map(w=>w.id===win.id?{...w,fileIdx:newIdx}:w)); };
              return <ViewerWindow key={win.id} win={win} closeWindow={closeWindow} bringToFront={bringToFront} openDossier={openDossier} openProjet={openProjet} setFs={setFs} navigate={navigate}/>;
            }
            return null;
          })}
        </div>

        {contactOpen && (
          <div style={{ position:"fixed", inset:0, top:76, background:"#fff", zIndex:999999, display:"flex", alignItems:"center", justifyContent:"center", borderTop:"1.25px solid #a21c26" }}>
            <DotBg/>
            <div style={{ position:"relative", zIndex:1 }}>
              <div style={{ position:"absolute", top:-32, left:0 }}><BtnClose onClick={()=>setContactOpen(false)}/></div>
              <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:12, color:"#a21c26", border:"1.25px solid #a21c26", padding:"48px 56px", minWidth:420, background:"#fff" }}>
                <div style={{ fontSize:13, fontWeight:700, letterSpacing:2, textTransform:"uppercase", marginBottom:36 }}>Contact</div>
                {[["Name","text"],["Email","email"],["Message","textarea"]].map(([ph,type])=>(
                  <div key={ph} style={{ marginBottom:24 }}>
                    {type==="textarea"
                      ? <textarea placeholder={ph} rows={6} style={{ width:"100%", fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"#a21c26", border:"none", borderBottom:"1.25px solid #a21c26", background:"transparent", resize:"none", outline:"none", padding:"4px 0", boxSizing:"border-box" }}/>
                      : <input type={type} placeholder={ph} style={{ width:"100%", fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"#a21c26", border:"none", borderBottom:"1.25px solid #a21c26", background:"transparent", outline:"none", padding:"4px 0", boxSizing:"border-box" }}/>
                    }
                  </div>
                ))}
                <button style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, fontWeight:700, letterSpacing:2, color:"#fff", background:"#a21c26", border:"none", padding:"10px 32px", cursor:"pointer" }}>Send</button>
              </div>
            </div>
          </div>
        )}

        {fs && (() => {
          const proj = getProj(fs.projId);
          const cf = proj.files[fs.fileIdx];
          const imgSrc = getImageSrc(cf?.name);
          return (
            <div style={{ position:"fixed", top:61, left:0, right:0, bottom:0, background:"#fff", zIndex:999999, display:"flex", flexDirection:"column", overflow:"hidden", borderTop:"1.25px solid #a21c26" }}>
              <div style={{ height:38, background:"#fff", borderBottom:"1.25px solid #a21c26", display:"flex", alignItems:"center", padding:"0 8px", gap:7, flexShrink:0 }}>
                <BtnClose onClick={()=>setFs(null)}/>
                <span style={{ fontSize:9, fontWeight:700, letterSpacing:1, color:"#c97a7a", marginLeft:12 }}>{cf.name}</span>
              </div>
              <div style={{ flex:1, overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center", background:"#fff", position:"relative" }}>
                <div onClick={()=>setFs(s=>({...s,fileIdx:(s.fileIdx-1+proj.files.length)%proj.files.length}))} style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", zIndex:10, width:32, height:56, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                  <svg width="14" height="28" viewBox="0 0 14 28"><polyline points="12,2 2,14 12,26" fill="none" stroke="#a21c26" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", width:"100%", height:"100%", padding:"16px 48px", boxSizing:"border-box" }}>
                  {imgSrc ? <img src={imgSrc} alt={cf.name} draggable="false" style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block" }}/> : <FileIcon ext={cf.ext} w={120} h={144}/>}
                </div>
                <div onClick={()=>setFs(s=>({...s,fileIdx:(s.fileIdx+1)%proj.files.length}))} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", zIndex:10, width:32, height:56, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                  <svg width="14" height="28" viewBox="0 0 14 28"><polyline points="2,2 12,14 2,26" fill="none" stroke="#a21c26" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              </div>
              <div style={{ height:76, background:"#fff", borderTop:"1.25px solid #a21c26", display:"flex", gap:8, padding:"8px 14px", overflowX:"auto", flexShrink:0, alignItems:"center" }}>
                {proj.files.map((f,i) => {
                  const tSrc = getImageSrc(f.name);
                  return <div key={i} onClick={()=>setFs(s=>({...s,fileIdx:i}))} style={{ width:58, height:58, flexShrink:0, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden", opacity:i===fs.fileIdx?1:0.5 }}>
                    {tSrc ? <img src={tSrc} alt={f.name} style={{ width:"100%", height:"100%", objectFit:"cover" }}/> : <FileIcon ext={f.ext} w={36} h={43}/>}
                  </div>;
                })}
              </div>
            </div>
          );
        })()}

        {cvOpen.size > 0 && (() => {
          const WIN_Z = cvZ;
          const S2 = {
            wrap:{ position:"fixed", zIndex:WIN_Z, pointerEvents:"auto", fontFamily:"'IBM Plex Mono',monospace", display:"flex", flexDirection:"column" },
            bar:{ height:27, background:"#fff", border:"1.25px solid #a21c26", borderBottom:"1.25px solid #a21c26", borderRadius:"4px 4px 0 0", display:"flex", alignItems:"center", padding:"0 8px", gap:7, position:"relative", flexShrink:0, cursor:"move" },
            title:{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontFamily:"'IBM Plex Mono', monospace", fontSize:14, fontWeight:400, fontStyle:"italic", letterSpacing:0.3, color:"#a21c26", whiteSpace:"nowrap", pointerEvents:"none" },
            body:{ padding:"18px 22px", fontSize:12, color:"#a21c26", letterSpacing:0.8, lineHeight:1.8, overflow:"auto" },
            row:{ display:"grid", gridTemplateColumns:"140px 1fr", gap:"4px 14px", marginBottom:14 },
            org:{ fontWeight:700, fontSize:12, color:"#a21c26" }, date:{ fontSize:9, color:"#c97a7a" },
            desc:{ fontSize:12, color:"#a21c26", lineHeight:1.65, fontStyle:"italic" },
            label:{ fontWeight:700, letterSpacing:1.5, fontSize:12, color:"#a21c26", display:"block", marginBottom:4 },
            val:{ fontWeight:400, color:"#a21c26", fontStyle:"italic", fontSize:12 },
          };
          const vw = window.innerWidth, cx = Math.round(vw/2), PAD = 12;
          const pW=200, xpW=420, eW=420;
          const totalW = pW+PAD+xpW+PAD+eW;
          const startX = Math.round(cx-totalW/2);
          const pX=startX, pY=190, xpX=pX+pW+PAD, xpY=210, eX=xpX+xpW+PAD, eY=175, skX=eX, skY=cvSkY;

          function CvWin({ id, title, x, y, w, children, onHeight }) {
            const [pos, setPos] = useState({ x, y });
            const drag = useRef(null);
            const ref = useRef(null);
            const onDown = e => {
              drag.current = { ox:e.clientX-pos.x, oy:e.clientY-pos.y };
              const onMove = ev => setPos({ x:ev.clientX-drag.current.ox, y:ev.clientY-drag.current.oy });
              const onUp = () => { drag.current=null; window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
              window.addEventListener("mousemove",onMove); window.addEventListener("mouseup",onUp);
            };
            useEffect(() => { if (ref.current && onHeight) onHeight(ref.current.offsetHeight); });
            const close = () => setCvOpen(s => { const n=new Set(s); n.delete(id); return n; });
            return (
              <div ref={ref} style={{ ...S2.wrap, left:pos.x, top:pos.y, width:w }}>
                <div style={S2.bar} onMouseDown={onDown}><BtnClose onClick={close}/><span style={S2.title}>{title}</span></div>
                <div style={{ ...S2.body, boxSizing:"border-box", border:"1.25px solid #a21c26", borderTop:"none", borderRadius:"0 0 4px 4px", background:"#fff" }}>{children}</div>
              </div>
            );
          }

          return (
            <React.Fragment>
              {cvOpen.has('portrait') && (
                <CvWin id="portrait" title="SILAN KIBORA" x={pX} y={pY} w={pW}>
                  <img src="https://raw.githubusercontent.com/kselaven-del/portfolio-CV/main/Silan%20KIBORA_bw.JPG" alt="Silan Kibora" style={{ width:"100%", display:"block", objectFit:"cover", marginBottom:12 }}/>
                  <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:"#a21c26", textAlign:"center" }}>SILAN KIBORA</div>
                  <div style={{ fontSize:9, color:"#c97a7a", letterSpacing:1.5, textAlign:"center", marginTop:3 }}>Architecture · Design</div>
                </CvWin>
              )}
              {cvOpen.has('education') && (
                <CvWin id="education" title="EDUCATION" x={eX} y={eY} w={eW} onHeight={h=>setCvSkY(eY+h+PAD)}>
                  <div style={S2.row}><div><div style={S2.org}>EPFL</div><div style={S2.date}>Lausanne, 2025</div></div><div style={S2.desc}>Master with the design studios: DOORZON et Piovennefabi</div></div>
                  <div style={S2.row}><div><div style={S2.org}>EPFL</div><div style={S2.date}>Lausanne, 2022</div></div><div style={S2.desc}>Bachelor with the design studios: Assemble, Bakker&Blanc et ALICE</div></div>
                  <div style={S2.row}><div><div style={S2.org}>GYRE</div><div style={S2.date}>Renens, 2019</div></div><div style={S2.desc}>Bilingual High School Diploma, Specialization in Mathematics and Physics</div></div>
                </CvWin>
              )}
              {cvOpen.has('experience') && (
                <CvWin id="experience" title="EXPERIENCE" x={xpX} y={xpY} w={xpW}>
                  <div style={S2.row}><div><div style={S2.org}>DMA</div><div style={S2.date}>Paris, 2023</div></div><div style={S2.desc}>Project, models, graphic documents, administrative documents</div></div>
                  <div style={S2.row}><div><div style={S2.org}>Ferrari Architects</div><div style={S2.date}>Lausanne, 2023</div></div><div style={S2.desc}>Graphic documents, administrative documents</div></div>
                  <div style={S2.row}><div><div style={S2.org}>Gérard Fauchère</div><div style={S2.date}>Evolène, 2023</div></div><div style={S2.desc}>Carpentry internship in the Alps</div></div>
                  <div style={S2.row}><div><div style={S2.org}>Memories Store</div><div style={S2.date}>Lausanne, 2019–2025</div></div><div style={S2.desc}>Creation of clothing collections, events organisation, store layout design</div></div>
                </CvWin>
              )}
              {cvOpen.has('skills') && (
                <CvWin id="skills" title="SKILLS" x={skX} y={skY} w={420}>
                  <div style={{ marginBottom:16 }}><span style={S2.label}>LANGUES</span><span style={S2.val}>Français (LM) · Anglais (courant) · Allemand (basique)</span></div>
                  <div style={{ marginBottom:16 }}><span style={S2.label}>MAÎTRISE</span><span style={S2.val}>Rhinceros 3D · Autocad · Photoshop · Illustrator · Indesign · Word · Excel</span></div>
                  <div><span style={S2.label}>NOTIONS</span><span style={S2.val}>Archicad · Vectorworks · Cinema 4d</span></div>
                </CvWin>
              )}
            </React.Fragment>
          );
        })()}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
